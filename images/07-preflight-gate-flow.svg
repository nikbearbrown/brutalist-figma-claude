<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="440" fill="#FFFFFF"/>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C8102E"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- Eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 7.2</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The Preflight Gate in the Pipeline Sequence</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Main horizontal flow, y=220 -->
  <!-- Node 1: Figma File (source — border fill) -->
  <rect x="48" y="190" width="124" height="60" fill="#D4D4D4" stroke="#121212" stroke-width="1"/>
  <text x="110" y="217" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">Figma File</text>
  <text x="110" y="235" font-size="11" fill="#545454" text-anchor="middle">source artifact</text>

  <!-- Arrow 1→2 -->
  <line x1="172" y1="220" x2="210" y2="220" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Node 2: figma:preflight -->
  <rect x="212" y="190" width="148" height="60" fill="#FFFFFF" stroke="#121212" stroke-width="1.5"/>
  <text x="286" y="213" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">figma:preflight</text>
  <text x="286" y="231" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">figma-preflight.mjs</text>
  <text x="286" y="245" font-size="10" fill="#545454" text-anchor="middle">exit 0 / exit 1</text>

  <!-- Arrow 2→3: PASSED label -->
  <line x1="360" y1="220" x2="398" y2="220" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <text x="379" y="213" font-size="10" fill="#545454" text-anchor="middle">PASSED</text>
  <!-- && label -->
  <text x="379" y="242" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">&amp;&amp;</text>

  <!-- Node 3: figma:tokens -->
  <rect x="400" y="190" width="140" height="60" fill="#FFFFFF" stroke="#121212" stroke-width="1.5"/>
  <text x="470" y="213" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">figma:tokens</text>
  <text x="470" y="231" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">extract-tokens.mjs</text>
  <text x="470" y="245" font-size="10" fill="#545454" text-anchor="middle">token extraction</text>

  <!-- Arrow 3→4 -->
  <line x1="540" y1="220" x2="578" y2="220" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <!-- && label -->
  <text x="559" y="213" font-size="10" fill="#545454" text-anchor="middle">&amp;&amp;</text>

  <!-- Node 4: figma:assets -->
  <rect x="580" y="190" width="140" height="60" fill="#FFFFFF" stroke="#121212" stroke-width="1.5"/>
  <text x="650" y="213" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">figma:assets</text>
  <text x="650" y="231" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">export-assets.mjs</text>
  <text x="650" y="245" font-size="10" fill="#545454" text-anchor="middle">asset export</text>

  <!-- Arrow 4→5 -->
  <line x1="720" y1="220" x2="758" y2="220" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Node 5: CI Pipeline Proceeds (terminal success — black fill) -->
  <rect x="760" y="190" width="160" height="60" fill="#121212" stroke="#121212" stroke-width="1.5"/>
  <text x="840" y="213" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">CI Pipeline</text>
  <text x="840" y="231" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">Proceeds</text>
  <text x="840" y="247" font-size="10" fill="#D4D4D4" text-anchor="middle">exit 0</text>

  <!-- BLOCKING exit arrow: preflight → down → HALT -->
  <!-- Vertical drop from bottom of preflight node -->
  <line x1="286" y1="250" x2="286" y2="318" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="310" y="289" font-size="10" fill="#C8102E">BLOCKING FOUND, exit 1</text>

  <!-- Node 6: HALT (terminal failure — red fill) -->
  <rect x="212" y="320" width="148" height="56" fill="#C8102E" stroke="#C8102E" stroke-width="1.5"/>
  <text x="286" y="347" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">HALT</text>
  <text x="286" y="365" font-size="10" fill="#FFFFFF" text-anchor="middle">pipeline stops here</text>

  <!-- Exit code legend -->
  <rect x="40" y="390" width="200" height="24" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="52" y="407" font-size="11" fill="#545454">exit 0 = proceed   exit 1 = halt</text>

  <!-- Caption -->
  <text x="40" y="430" font-size="13" fill="#545454">The preflight script sits at the head of the CI pipeline chain; a blocking exit halts token extraction and asset export before they run, making the machine-readiness contract structurally enforced.</text>
</svg>
