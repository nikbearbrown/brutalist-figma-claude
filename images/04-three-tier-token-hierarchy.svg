<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="560" fill="#FFFFFF"/>

  <defs>
    <!-- Upward alias arrow (dashed, ink) -->
    <marker id="aliasarrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
  </defs>

  <!-- eyebrow / title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 4.2</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The three-tier token hierarchy</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ─── TIER 1 — Primitive band ─── -->
  <rect x="40" y="110" width="880" height="108" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="132" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#121212">Tier 1 — Primitive</text>
  <text x="56" y="148" font-size="11" fill="#545454">Raw values · never consumed directly by product code</text>

  <!-- Primitive node A -->
  <rect x="100" y="156" width="290" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="245" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">color/palette/blue-500</text>
  <line x1="110" y1="183" x2="380" y2="183" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="245" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">→ #0066ff</text>

  <!-- Primitive node B -->
  <rect x="430" y="156" width="210" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="535" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">spacing/scale/8</text>
  <line x1="440" y1="183" x2="630" y2="183" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="535" y="198" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">→ 8px</text>

  <!-- ─── TIER 2 — Semantic band (brand-red border = contract layer) ─── -->
  <rect x="40" y="236" width="880" height="120" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="56" y="258" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#121212">Tier 2 — Semantic</text>
  <text x="56" y="274" font-size="11" fill="#545454">Decision tokens · alias into primitives · </text>
  <text x="270" y="274" font-size="11" fill="#C8102E" font-weight="700">product code consumes this tier</text>

  <!-- Semantic node A -->
  <rect x="65" y="282" width="310" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="220" y="302" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">color/brand/primary</text>
  <line x1="75" y1="309" x2="365" y2="309" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="220" y="327" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">→ {color.palette.blue-500}</text>

  <!-- Semantic node B -->
  <rect x="410" y="282" width="280" height="58" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="550" y="302" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">spacing/component/gap</text>
  <line x1="420" y1="309" x2="680" y2="309" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="550" y="327" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">→ {spacing.scale.8}</text>

  <!-- ─── TIER 3 — Component band (neutral, subdued) ─── -->
  <rect x="40" y="376" width="880" height="108" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="56" y="398" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#545454">Tier 3 — Component</text>
  <text x="56" y="414" font-size="11" fill="#545454">Per-component overrides · aliases into semantic tier ·</text>
  <text x="300" y="414" font-size="11" fill="#545454" font-style="italic">optional</text>

  <!-- Component node -->
  <rect x="160" y="422" width="390" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="355" y="442" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">color/button/background/default</text>
  <line x1="170" y1="449" x2="540" y2="449" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="355" y="464" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">→ {color.interactive.default}</text>

  <!-- ─── ALIAS ARROWS (upward — component → semantic → primitive) ─── -->

  <!-- Component node → Semantic node A (alias reference upward) -->
  <line x1="355" y1="422" x2="245" y2="340" stroke="#121212" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#aliasarrow)"/>

  <!-- Semantic node A → Primitive node A (alias reference upward) -->
  <line x1="220" y1="282" x2="220" y2="206" stroke="#121212" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#aliasarrow)"/>

  <!-- Semantic node B → Primitive node B (alias reference upward) -->
  <line x1="540" y1="282" x2="535" y2="206" stroke="#121212" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#aliasarrow)"/>

  <!-- Alias direction label -->
  <text x="82" y="316" font-size="10" fill="#545454" font-style="italic">alias →</text>

  <!-- caption -->
  <text x="40" y="530" font-size="13" fill="#545454">Three tiers — primitive, semantic, component — form the token stack; alias references flow upward, product code consumes only the semantic tier.</text>
</svg>
