<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="440" fill="#FFFFFF"/>

  <!-- eyebrow / title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 10.2</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">sync-docs pipeline: Figma to documentation portal</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#D4D4D4" stroke-width="1"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- ── SOURCE: Figma Library ── -->
  <rect x="40" y="170" width="180" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="130" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Figma Library</text>
  <text x="130" y="213" text-anchor="middle" font-size="11" fill="#545454">published</text>
  <text x="130" y="228" text-anchor="middle" font-size="11" fill="#545454">components</text>

  <!-- Arrow source → tool, labeled with API call -->
  <line x1="220" y1="202" x2="308" y2="202" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="264" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">GET /v1/files/:key</text>

  <!-- ── TOOL: sync-docs.mjs (red — primary transform) ── -->
  <rect x="310" y="158" width="180" height="88" fill="#C8102E" stroke="#C8102E" stroke-width="1.5"/>
  <text x="400" y="192" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#FFFFFF">sync-docs.mjs</text>
  <text x="400" y="212" text-anchor="middle" font-size="11" fill="#FFFFFF">extract · transform</text>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#FFFFFF">write artifacts</text>

  <!-- ── FAN-OUT ARROWS: tool → three artifacts ── -->
  <!-- tool center-right → artifact A -->
  <line x1="490" y1="180" x2="558" y2="148" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- tool center-right → artifact B -->
  <line x1="490" y1="202" x2="558" y2="202" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- tool center-right → artifact C -->
  <line x1="490" y1="224" x2="558" y2="256" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── ARTIFACTS A, B, C ── -->

  <!-- Artifact A: component-inventory.json -->
  <rect x="560" y="118" width="200" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="660" y="139" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#121212">component-inventory.json</text>
  <text x="660" y="155" text-anchor="middle" font-size="10" fill="#545454">all component sets + metadata</text>

  <!-- Artifact B: variant-tables.json -->
  <rect x="560" y="178" width="200" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="660" y="199" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#121212">variant-tables.json</text>
  <text x="660" y="215" text-anchor="middle" font-size="10" fill="#545454">dimension / value matrices</text>

  <!-- Artifact C: missing-docs.json -->
  <rect x="560" y="238" width="200" height="48" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="660" y="259" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#121212">missing-docs.json</text>
  <text x="660" y="275" text-anchor="middle" font-size="10" fill="#545454">components without descriptions</text>

  <!-- ── FAN-IN ARROWS: artifacts → consumer ── -->
  <line x1="760" y1="142" x2="828" y2="188" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="202" x2="828" y2="202" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="760" y1="262" x2="828" y2="216" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── CONSUMER: Documentation Portal (terminal, black) ── -->
  <rect x="830" y="158" width="90" height="88" fill="#121212" stroke="#121212" stroke-width="1.5"/>
  <text x="875" y="190" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">Doc</text>
  <text x="875" y="206" text-anchor="middle" font-size="11" font-weight="600" fill="#FFFFFF">portal</text>
  <text x="875" y="225" text-anchor="middle" font-size="10" fill="#D4D4D4">Storybook</text>
  <text x="875" y="238" text-anchor="middle" font-size="10" fill="#D4D4D4">Zeroheight</text>

  <!-- ── CI GATE (dashed, hanging below tool) ── -->
  <!-- dashed arrow from tool down to CI gate box -->
  <line x1="400" y1="246" x2="400" y2="304" stroke="#545454" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowgray)"/>
  <text x="413" y="282" font-size="10" fill="#545454">CI fail</text>
  <text x="413" y="294" font-size="10" fill="#545454">condition</text>

  <!-- CI Gate box -->
  <rect x="280" y="306" width="240" height="52" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="400" y="326" text-anchor="middle" font-size="11" font-weight="600" fill="#545454">CI Gate</text>
  <text x="400" y="342" text-anchor="middle" font-size="11" fill="#545454">exit 1 if component set has no description</text>
  <text x="400" y="356" text-anchor="middle" font-size="11" fill="#545454">warn if individual component undocumented</text>

  <!-- ── STAGE LABEL ── -->
  <text x="40" y="150" font-size="11" font-weight="600" fill="#545454" letter-spacing="0.5">SOURCE</text>
  <text x="310" y="150" font-size="11" font-weight="600" fill="#545454" letter-spacing="0.5">TOOL</text>
  <text x="560" y="108" font-size="11" font-weight="600" fill="#545454" letter-spacing="0.5">ARTIFACTS</text>
  <text x="830" y="150" font-size="11" font-weight="600" fill="#545454" letter-spacing="0.5">CONSUMER</text>

  <!-- caption -->
  <text x="40" y="410" font-size="13" fill="#545454">sync-docs.mjs reads the published Figma library once and fans out to three artifacts — component inventory, variant tables, and a missing-description report — which documentation platforms consume; CI exits 1 when any component set has no description.</text>
</svg>
