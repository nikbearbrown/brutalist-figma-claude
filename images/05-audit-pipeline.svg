<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="520" fill="#FFFFFF"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- eyebrow / title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 5.1</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The audit pipeline</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Column headers -->
  <text x="130" y="120" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#121212">Fetch</text>
  <text x="490" y="120" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#121212">Check</text>
  <text x="830" y="120" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="15" fill="#121212">Report</text>

  <!-- ─── FETCH node (left, primary structural anchor) ─── -->
  <rect x="40" y="130" width="180" height="110" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="130" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#121212">Fetch</text>
  <line x1="50" y1="163" x2="210" y2="163" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="130" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">GET /v1/files/:key</text>
  <text x="130" y="195" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">GET /v1/files/:key/</text>
  <text x="130" y="209" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">variables/local</text>
  <text x="130" y="228" text-anchor="middle" font-size="10" fill="#545454">or local fixture</text>

  <!-- Six check module nodes — center column -->
  <!-- vertical positions: 136, 186, 236, 286, 336, 386 (top of each, height 40) -->

  <!-- check-naming.js -->
  <rect x="340" y="136" width="300" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="152" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-naming.js</text>
  <text x="490" y="167" text-anchor="middle" font-size="10" fill="#545454">naming convention</text>

  <!-- check-token-hygiene.js -->
  <rect x="340" y="184" width="300" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="200" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-token-hygiene.js</text>
  <text x="490" y="215" text-anchor="middle" font-size="10" fill="#545454">alias chains, orphaned refs</text>

  <!-- check-component-hygiene.js -->
  <rect x="340" y="232" width="300" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="248" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-component-hygiene.js</text>
  <text x="490" y="263" text-anchor="middle" font-size="10" fill="#545454">descriptions, publish state</text>

  <!-- check-brand-compliance.js -->
  <rect x="340" y="280" width="300" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="296" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-brand-compliance.js</text>
  <text x="490" y="311" text-anchor="middle" font-size="10" fill="#545454">hardcoded fills, off-brand values</text>

  <!-- check-accessibility.js (red border — most commonly yields blocking findings) -->
  <rect x="340" y="328" width="300" height="40" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="490" y="344" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-accessibility.js</text>
  <text x="490" y="359" text-anchor="middle" font-size="10" fill="#545454">WCAG contrast, text pairs</text>

  <!-- check-structure.js -->
  <rect x="340" y="376" width="300" height="40" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="490" y="392" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">check-structure.js</text>
  <text x="490" y="407" text-anchor="middle" font-size="10" fill="#545454">collections, pages, export layers</text>

  <!-- ─── REPORT node (right, primary structural anchor) ─── -->
  <rect x="740" y="220" width="180" height="110" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="830" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#121212">Report</text>
  <line x1="750" y1="253" x2="910" y2="253" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="830" y="270" text-anchor="middle" font-size="11" fill="#545454">markdown + JSON</text>
  <text x="830" y="288" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">audit-report.md</text>
  <text x="830" y="303" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">audit-report.json</text>
  <text x="830" y="320" text-anchor="middle" font-size="10" fill="#545454">exit 1 on errors</text>

  <!-- ─── ARROWS: fan-out from Fetch right edge → left edge of each check ─── -->
  <!-- Fetch right edge at x=220, vertically centered at y=185 -->
  <!-- Fan-out spine from fetch exit -->
  <line x1="220" y1="185" x2="280" y2="185" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Vertical spine -->
  <line x1="280" y1="156" x2="280" y2="396" stroke="#121212" stroke-width="1"/>
  <!-- Branch lines to each check module -->
  <line x1="280" y1="156" x2="338" y2="156" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="204" x2="338" y2="204" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="252" x2="338" y2="252" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="300" x2="338" y2="300" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="348" x2="338" y2="348" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="396" x2="338" y2="396" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ─── ARROWS: fan-in from right edge of each check → Report left edge ─── -->
  <!-- Vertical spine on right -->
  <line x1="700" y1="156" x2="700" y2="396" stroke="#121212" stroke-width="1"/>
  <!-- Branch lines from each check module -->
  <line x1="640" y1="156" x2="700" y2="156" stroke="#121212" stroke-width="1"/>
  <line x1="640" y1="204" x2="700" y2="204" stroke="#121212" stroke-width="1"/>
  <line x1="640" y1="252" x2="700" y2="252" stroke="#121212" stroke-width="1"/>
  <line x1="640" y1="300" x2="700" y2="300" stroke="#121212" stroke-width="1"/>
  <line x1="640" y1="348" x2="700" y2="348" stroke="#121212" stroke-width="1"/>
  <line x1="640" y1="396" x2="700" y2="396" stroke="#121212" stroke-width="1"/>
  <!-- Spine to Report -->
  <line x1="700" y1="275" x2="738" y2="275" stroke="#121212" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Parallel note -->
  <text x="490" y="440" text-anchor="middle" font-size="11" fill="#545454" font-style="italic">six checks run in parallel — each receives the full data object independently</text>

  <!-- caption -->
  <text x="40" y="504" font-size="13" fill="#545454">figma-audit.js fans six parallel rule categories across a single data fetch and collects all findings into dual-format output for human and CI consumption.</text>
</svg>
