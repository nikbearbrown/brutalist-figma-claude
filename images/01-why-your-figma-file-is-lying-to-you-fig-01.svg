<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-01 fig-desc-01">
  <title id="fig-title-01">Figma document graph vs. rendered canvas</title>
  <desc id="fig-desc-01">Diagram showing a Figma file as a node graph with variable bindings on the left, contrasted with the rendered canvas view on the right, illustrating that the canvas is a rendering of the graph, not the data itself.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>

  <!-- Canvas background -->
  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Left panel: Document Graph -->
  <rect x="32" y="32" width="295" height="356" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>

  <!-- Left panel label -->
  <text x="179" y="60" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="400" fill="#555555" text-anchor="middle" letter-spacing="0.08em">DOCUMENT GRAPH</text>

  <!-- Root node: DOCUMENT -->
  <rect x="112" y="76" width="135" height="32" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="179" y="96" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="11" fill="#000000" text-anchor="middle">DOCUMENT  0:0</text>

  <!-- CANVAS node -->
  <rect x="112" y="136" width="135" height="32" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="179" y="156" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="11" fill="#000000" text-anchor="middle">CANVAS  1:0</text>

  <!-- Arrow DOCUMENT → CANVAS -->
  <line x1="179" y1="108" x2="179" y2="133" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- COMPONENT node -->
  <rect x="72" y="196" width="155" height="32" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="149" y="216" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="11" fill="#000000" text-anchor="middle">COMPONENT  1:23</text>

  <!-- Arrow CANVAS → COMPONENT -->
  <line x1="149" y1="168" x2="149" y2="193" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- fills box -->
  <rect x="56" y="256" width="90" height="28" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="101" y="274" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#000000" text-anchor="middle">fills: SOLID</text>

  <!-- boundVariables box -->
  <rect x="162" y="256" width="104" height="28" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="214" y="274" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#C8102E" text-anchor="middle">boundVariables</text>

  <!-- Arrow COMPONENT → fills -->
  <line x1="120" y1="228" x2="101" y2="253" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow COMPONENT → boundVariables -->
  <line x1="178" y1="228" x2="214" y2="253" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Variable node -->
  <rect x="152" y="316" width="124" height="32" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="214" y="332" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#C8102E" text-anchor="middle">VariableID:12:45</text>
  <text x="214" y="344" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">color/brand/primary</text>

  <!-- Arrow boundVariables → Variable -->
  <line x1="214" y1="284" x2="214" y2="313" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- Right panel: Rendered Canvas -->
  <rect x="373" y="32" width="295" height="356" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>

  <!-- Right panel label -->
  <text x="520" y="60" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="400" fill="#555555" text-anchor="middle" letter-spacing="0.08em">RENDERED CANVAS</text>

  <!-- Simulated Figma canvas area -->
  <rect x="405" y="76" width="231" height="200" fill="#E8E8E8" stroke="#CCCCCC" stroke-width="0.75"/>

  <!-- Simulated frame on canvas -->
  <rect x="425" y="96" width="191" height="160" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>

  <!-- Simulated primary button on canvas -->
  <rect x="453" y="140" width="135" height="36" fill="#1558D6" rx="0"/>
  <text x="520" y="163" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">Primary button</text>

  <!-- "Pixels, not data" label -->
  <text x="520" y="298" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">Pixels rendered from the graph.</text>
  <text x="520" y="312" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">Not linked to production.</text>

  <!-- Resolved color swatch -->
  <rect x="465" y="324" width="16" height="16" fill="#1558D6" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="487" y="336" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555">#1558D6 (resolved)</text>

  <!-- Center divider arrow -->
  <line x1="335" y1="210" x2="365" y2="210" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="204" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">renders</text>

  <!-- Red "not linked" note on right -->
  <rect x="405" y="355" width="231" height="22" fill="#FFFFFF" stroke="#C8102E" stroke-width="1"/>
  <text x="520" y="370" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#C8102E" text-anchor="middle">Variable change does not reach production</text>

  <!-- Bottom caption -->
  <text x="350" y="406" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">The file is a graph; the canvas is a rendering of the graph.</text>
</svg>
