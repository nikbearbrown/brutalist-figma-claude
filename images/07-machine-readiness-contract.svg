<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="560" fill="#FFFFFF"/>

  <!-- Eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 7.1</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The Five-Category Machine-Readiness Contract</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Table outer border -->
  <rect x="40" y="114" width="880" height="380" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Header row -->
  <rect x="40" y="114" width="880" height="40" fill="#121212"/>
  <text x="56" y="139" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="0.8">CATEGORY</text>
  <text x="240" y="139" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="0.8">KEY CRITERION</text>
  <text x="640" y="139" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="0.8">SEVERITY</text>
  <text x="760" y="139" font-size="12" font-weight="700" fill="#FFFFFF" letter-spacing="0.8">CONSEQUENCE IF FAILED</text>

  <!-- Vertical column dividers -->
  <line x1="232" y1="114" x2="232" y2="494" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="632" y1="114" x2="632" y2="494" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="752" y1="114" x2="752" y2="494" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 1: Naming Contract -->
  <rect x="40" y="154" width="880" height="76" fill="#FFFFFF"/>
  <line x1="40" y1="230" x2="920" y2="230" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="176" font-size="13" font-weight="600" fill="#121212">Naming Contract</text>
  <text x="248" y="176" font-size="12" fill="#121212">All variables follow slash-separated</text>
  <text x="248" y="192" font-size="12" fill="#121212">hierarchy with ≥2 levels</text>
  <text x="248" y="208" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">e.g. color/brand/primary</text>
  <!-- BLOCKING badge -->
  <rect x="640" y="166" width="100" height="22" fill="#C8102E"/>
  <text x="690" y="181" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">BLOCKING</text>
  <text x="768" y="176" font-size="12" fill="#121212">Pipeline output contains</text>
  <text x="768" y="192" font-size="12" fill="#121212">unclassifiable token names</text>

  <!-- Row 2: Variable Architecture (tinted) -->
  <rect x="40" y="230" width="880" height="76" fill="#F9F9F9"/>
  <line x1="40" y1="306" x2="920" y2="306" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="252" font-size="13" font-weight="600" fill="#121212">Variable Architecture</text>
  <text x="248" y="252" font-size="12" fill="#121212">All alias chains resolve to a raw value —</text>
  <text x="248" y="268" font-size="12" fill="#121212">no broken references</text>
  <!-- BLOCKING badge -->
  <rect x="640" y="242" width="100" height="22" fill="#C8102E"/>
  <text x="690" y="257" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">BLOCKING</text>
  <text x="768" y="252" font-size="12" fill="#121212">Extraction writes unresolved</text>
  <text x="768" y="268" font-size="12" fill="#121212">references or crashes on resolve</text>

  <!-- Row 3: Publication State -->
  <rect x="40" y="306" width="880" height="76" fill="#FFFFFF"/>
  <line x1="40" y1="382" x2="920" y2="382" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="328" font-size="13" font-weight="600" fill="#121212">Publication State</text>
  <text x="248" y="328" font-size="12" fill="#121212">Component library published at least once;</text>
  <text x="248" y="344" font-size="12" fill="#121212">no published components moved unpublished</text>
  <!-- BLOCKING badge -->
  <rect x="640" y="318" width="100" height="22" fill="#C8102E"/>
  <text x="690" y="333" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">BLOCKING</text>
  <text x="768" y="328" font-size="12" fill="#121212">Downstream tools receive</text>
  <text x="768" y="344" font-size="12" fill="#121212">incomplete component metadata</text>

  <!-- Row 4: Component Documentation (tinted) -->
  <rect x="40" y="382" width="880" height="76" fill="#F9F9F9"/>
  <line x1="40" y1="458" x2="920" y2="458" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="404" font-size="13" font-weight="600" fill="#121212">Component Documentation</text>
  <text x="248" y="404" font-size="12" fill="#121212">All published components have a non-empty</text>
  <text x="248" y="420" font-size="12" fill="#121212">description field</text>
  <!-- ADVISORY badge -->
  <rect x="640" y="394" width="100" height="22" fill="#545454"/>
  <text x="690" y="409" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">ADVISORY</text>
  <text x="768" y="404" font-size="12" fill="#121212">AI agents and doc generators</text>
  <text x="768" y="420" font-size="12" fill="#121212">receive no description context</text>

  <!-- Row 5: Export Targets -->
  <rect x="40" y="458" width="880" height="36" fill="#FFFFFF"/>
  <text x="56" y="481" font-size="13" font-weight="600" fill="#121212">Export Targets</text>
  <text x="248" y="481" font-size="12" fill="#121212">All intended export frames have export settings configured</text>
  <!-- BLOCKING badge -->
  <rect x="640" y="469" width="100" height="22" fill="#C8102E"/>
  <text x="690" y="484" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.5">BLOCKING</text>
  <text x="768" y="481" font-size="12" fill="#121212">Asset pipeline finds no export targets</text>

  <!-- Caption -->
  <text x="40" y="541" font-size="13" fill="#545454">The five categories of the machine-readiness contract, with their default severity; BLOCKING findings cause the preflight script to exit non-zero and halt all downstream pipeline steps.</text>
</svg>
