<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-ch3-02 fig-desc-ch3-02">
  <title id="fig-title-ch3-02">Alias chain resolution from semantic token to primitive value</title>
  <desc id="fig-desc-ch3-02">Diagram showing how a semantic variable "color/brand/primary" in the variables block points via VARIABLE_ALIAS to a primitive "color/primitive/blue-500", which holds the raw color value, with arrows showing valuesByMode consultation at each step.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>

  <!-- Canvas background -->
  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Title label -->
  <text x="350" y="40" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle" letter-spacing="0.08em">ALIAS CHAIN RESOLUTION</text>

  <!-- Left: Component node with boundVariables -->
  <rect x="32" y="60" width="152" height="80" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="108" y="80" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">COMPONENT node</text>
  <text x="108" y="96" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">fills[0].color:</text>
  <text x="108" y="110" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">{ r:0.08, g:0.34, b:0.86 }</text>
  <text x="108" y="126" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#C8102E" text-anchor="middle">boundVariables → VariableID:12:45</text>

  <!-- Arrow: component → semantic var -->
  <line x1="184" y1="100" x2="216" y2="100" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="200" y="92" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#C8102E" text-anchor="middle">alias ref</text>

  <!-- Center-left: Semantic variable -->
  <rect x="216" y="56" width="180" height="100" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="306" y="76" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#C8102E" text-anchor="middle">VariableID:12:45</text>
  <text x="306" y="92" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">color/brand/primary</text>
  <text x="306" y="108" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">resolvedType: COLOR</text>
  <rect x="232" y="116" width="148" height="28" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="306" y="129" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">valuesByMode["12:0"]:</text>
  <text x="306" y="141" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#C8102E" text-anchor="middle">{ type: "VARIABLE_ALIAS", id: "..." }</text>

  <!-- Arrow: semantic → primitive -->
  <line x1="396" y1="110" x2="428" y2="110" stroke="#C8102E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="412" y="102" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#C8102E" text-anchor="middle">alias</text>

  <!-- Center-right: Primitive variable -->
  <rect x="428" y="56" width="180" height="100" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="518" y="76" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">VariableID:11:30</text>
  <text x="518" y="92" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">color/primitive/blue-500</text>
  <text x="518" y="108" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">resolvedType: COLOR</text>
  <rect x="444" y="116" width="148" height="28" fill="#FFFFFF" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="518" y="129" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">valuesByMode["11:0"]:</text>
  <text x="518" y="141" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">{ r:0.08, g:0.34, b:0.86, a:1 }</text>

  <!-- Arrow: primitive → terminal -->
  <line x1="608" y1="110" x2="640" y2="110" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="624" y="102" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">terminal</text>

  <!-- Terminal hex value -->
  <rect x="640" y="88" width="28" height="44" fill="#1558D6" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="654" y="118" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="8" fill="#FFFFFF" text-anchor="middle">#1558D6</text>

  <!-- Mode consultation diagram (below) -->
  <text x="350" y="188" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">Mode lookup at each step</text>

  <!-- Mode lookup boxes -->
  <rect x="32" y="204" width="200" height="80" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="132" y="224" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">Semantic token</text>
  <text x="132" y="240" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">collection.modes:</text>
  <text x="132" y="256" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">"12:0" → Light</text>
  <text x="132" y="272" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">"12:1" → Dark</text>

  <rect x="252" y="204" width="196" height="80" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="350" y="224" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">valuesByMode[modeId]</text>
  <text x="350" y="240" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">Light → VARIABLE_ALIAS (→ primitive)</text>
  <text x="350" y="256" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">Dark  → VARIABLE_ALIAS (→ primitive)</text>
  <text x="350" y="272" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#C8102E" text-anchor="middle">May alias a different primitive per mode</text>

  <rect x="468" y="204" width="200" height="80" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="568" y="224" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">Primitive token</text>
  <text x="568" y="240" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">valuesByMode[modeId]:</text>
  <text x="568" y="256" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#000000" text-anchor="middle">raw { r, g, b, a }</text>
  <text x="568" y="272" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">terminal — no more aliases</text>

  <!-- Arrows between mode boxes -->
  <line x1="232" y1="244" x2="252" y2="244" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="448" y1="244" x2="468" y2="244" stroke="#000000" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Key insight box -->
  <rect x="32" y="308" width="636" height="52" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="350" y="328" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="11" font-weight="700" fill="#C8102E" text-anchor="middle">Use the variable reference, not the resolved value</text>
  <text x="350" y="346" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">The resolved value is a snapshot. The variable ID is stable — it updates when the designer changes the token.</text>

  <!-- Caption -->
  <text x="350" y="396" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">Alias chain: semantic token → primitive token → raw hex. Resolve per mode.</text>
</svg>
