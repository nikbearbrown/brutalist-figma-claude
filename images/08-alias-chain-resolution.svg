<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="420" fill="#FFFFFF"/>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- Eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 8.3</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">Alias Chain Resolution: Healthy vs. Broken</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Panel divider (center) -->
  <line x1="480" y1="104" x2="480" y2="390" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ── PANEL A: Healthy chain ── -->
  <!-- Panel label: VALID -->
  <text x="240" y="124" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="1">VALID</text>

  <!-- Role labels -->
  <text x="76" y="154" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="0.5">SEMANTIC</text>
  <text x="244" y="154" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="0.5">PRIMITIVE</text>
  <text x="408" y="154" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="0.5">RAW VALUE</text>

  <!-- Node A1: semantic token -->
  <rect x="28" y="162" width="96" height="52" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="76" y="180" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">color/button/</text>
  <text x="76" y="193" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">primary</text>

  <!-- Arrow A1→A2, label "aliases" -->
  <line x1="124" y1="188" x2="192" y2="188" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <text x="158" y="182" font-size="10" fill="#545454" text-anchor="middle">aliases</text>

  <!-- Node A2: primitive token -->
  <rect x="194" y="162" width="100" height="52" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="244" y="180" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">color/brand/</text>
  <text x="244" y="193" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">blue-600</text>

  <!-- Arrow A2→A3, label "resolves to" -->
  <line x1="294" y1="188" x2="362" y2="188" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <text x="328" y="182" font-size="10" fill="#545454" text-anchor="middle">resolves to</text>

  <!-- Node A3: raw value — terminal black fill -->
  <rect x="364" y="162" width="88" height="52" fill="#121212" stroke="#121212" stroke-width="1"/>
  <text x="408" y="183" font-family="JetBrains Mono, monospace" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">#2563EB</text>
  <text x="408" y="200" font-size="10" fill="#D4D4D4" text-anchor="middle">hex color</text>

  <!-- Healthy annotation -->
  <rect x="28" y="234" width="424" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="240" y="252" font-size="12" fill="#545454" text-anchor="middle">resolveAlias() returns "#2563EB" — chain complete</text>

  <!-- ── PANEL B: Broken chain ── -->
  <!-- Panel label: BROKEN -->
  <text x="710" y="124" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="1">BROKEN</text>

  <!-- Role labels -->
  <text x="548" y="154" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="0.5">SEMANTIC</text>
  <text x="718" y="154" font-size="10" font-weight="700" fill="#545454" text-anchor="middle" letter-spacing="0.5">TARGET</text>

  <!-- Node B1: semantic token (still valid) -->
  <rect x="500" y="162" width="96" height="52" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="548" y="180" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">color/button/</text>
  <text x="548" y="193" font-family="JetBrains Mono, monospace" font-size="10" fill="#121212" text-anchor="middle">primary</text>

  <!-- Broken arrow to missing node (dashed, gray) -->
  <line x1="596" y1="188" x2="664" y2="188" stroke="#545454" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-gray)"/>
  <text x="630" y="182" font-size="10" fill="#545454" text-anchor="middle">aliases</text>

  <!-- Node B2: [deleted variable] — dashed border, ghost appearance -->
  <rect x="666" y="162" width="104" height="52" fill="#FFFFFF" stroke="#545454" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="718" y="180" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">[deleted</text>
  <text x="718" y="193" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">variable]</text>
  <text x="718" y="207" font-size="9" fill="#545454" text-anchor="middle">not found</text>

  <!-- No Node B3 — absent (indicates chain breaks) -->
  <!-- Absent marker: dashed box outline only, very faint -->
  <rect x="800" y="162" width="80" height="52" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="3,5"/>
  <text x="840" y="190" font-size="10" fill="#D4D4D4" text-anchor="middle">(no value</text>
  <text x="840" y="203" font-size="10" fill="#D4D4D4" text-anchor="middle">reachable)</text>

  <!-- Error label below B2 — red, bold -->
  <text x="718" y="232" font-size="11" font-weight="600" fill="#C8102E" text-anchor="middle">Broken alias — exit non-zero</text>

  <!-- Broken annotation -->
  <rect x="500" y="248" width="424" height="28" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="712" y="266" font-size="12" fill="#545454" text-anchor="middle">resolveAlias() throws: Missing variable: &lt;variableId&gt;</text>

  <!-- ── Resolution flow summary ── -->
  <line x1="40" y1="308" x2="920" y2="308" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Preflight catches note -->
  <text x="40" y="334" font-size="13" fill="#121212" font-weight="600">Preflight catch:</text>
  <text x="170" y="334" font-size="13" fill="#545454">broken aliases are caught by</text>
  <text x="170" y="334" font-family="JetBrains Mono, monospace" font-size="13" fill="#545454">   </text>
  <text x="380" y="334" font-family="JetBrains Mono, monospace" font-size="13" fill="#545454">figma-preflight.mjs</text>
  <text x="560" y="334" font-size="13" fill="#545454">before</text>
  <text x="600" y="334" font-family="JetBrains Mono, monospace" font-size="13" fill="#545454">extract-tokens.mjs</text>
  <text x="766" y="334" font-size="13" fill="#545454">runs</text>

  <!-- Caption -->
  <text x="40" y="374" font-size="13" fill="#545454">A healthy alias chain (left) resolves a semantic token through a primitive to a raw hex value; a broken chain (right) references a variable</text>
  <text x="40" y="390" font-size="13" fill="#545454">that no longer exists, producing the broken-alias blocking finding that the preflight script catches before extraction runs.</text>
</svg>
