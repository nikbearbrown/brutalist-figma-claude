<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 390" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="Figure 14.3: Runbook Cadence — Five Recurring Checkpoints">
  <title>Figure 14.3 — Runbook Cadence: Five Recurring Checkpoints</title>
  <desc>The five recurring governance checkpoints — PR review, merge pipeline, weekly audit, pre-release gate, and MCP session preflight — form a repeating rhythm; red markers indicate checkpoints where human review is always required before any artifact advances.</desc>
  <rect width="960" height="390" fill="#FFFFFF"/>

  <!-- eyebrow / title / rule -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 14.3</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">Runbook cadence: five recurring checkpoints</text>
  <line x1="40" y1="90" x2="920" y2="90" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#D4D4D4"/>
    </marker>
  </defs>

  <!-- Main horizontal timeline axis -->
  <line x1="60" y1="220" x2="900" y2="220" stroke="#121212" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Checkpoint positions (x centers):
       PR review: 120, Merge: 270, Weekly: 470, Pre-release: 670, MCP session: 830 -->

  <!-- Checkpoint 1: PR review (event-triggered, human required) -->
  <!-- Drop line -->
  <line x1="120" y1="186" x2="120" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <!-- Node box above axis -->
  <rect x="60" y="122" width="120" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1.5"/>
  <!-- Red human review left-border accent -->
  <rect x="60" y="122" width="4" height="64" fill="#C8102E"/>
  <text x="126" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">PR review</text>
  <text x="126" y="159" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:preflight</text>
  <text x="126" y="175" text-anchor="middle" font-size="10" fill="#545454">event-triggered</text>
  <!-- Human review indicator label -->
  <text x="120" y="248" text-anchor="middle" font-size="10" fill="#C8102E" font-weight="600">human review</text>

  <!-- Checkpoint 2: Merge pipeline (event-triggered, human required) -->
  <line x1="270" y1="186" x2="270" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="210" y="122" width="120" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1.5"/>
  <rect x="210" y="122" width="4" height="64" fill="#C8102E"/>
  <text x="276" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Merge pipeline</text>
  <text x="276" y="159" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:tokens</text>
  <text x="276" y="173" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:assets</text>
  <text x="276" y="186" text-anchor="middle" font-size="10" fill="#545454">event-triggered</text>
  <text x="270" y="248" text-anchor="middle" font-size="10" fill="#C8102E" font-weight="600">human review</text>

  <!-- Checkpoint 3: Weekly scheduled (time-triggered, different fill) -->
  <line x1="470" y1="186" x2="470" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="410" y="122" width="120" height="64" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1.5"/>
  <text x="470" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Weekly audit</text>
  <text x="470" y="159" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:audit</text>
  <text x="470" y="173" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:brand</text>
  <text x="470" y="186" text-anchor="middle" font-size="10" fill="#545454">scheduled · Mon 9am UTC</text>
  <text x="470" y="248" text-anchor="middle" font-size="10" fill="#545454">errors only</text>

  <!-- Checkpoint 4: Pre-release gate (event-triggered, human required) -->
  <line x1="670" y1="186" x2="670" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="610" y="122" width="120" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1.5"/>
  <rect x="610" y="122" width="4" height="64" fill="#C8102E"/>
  <text x="676" y="141" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Pre-release gate</text>
  <text x="676" y="157" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:full</text>
  <text x="676" y="171" text-anchor="middle" font-size="10" fill="#545454">all commands</text>
  <text x="676" y="184" text-anchor="middle" font-size="10" fill="#545454">event-triggered</text>
  <text x="670" y="248" text-anchor="middle" font-size="10" fill="#C8102E" font-weight="600">human review</text>

  <!-- Checkpoint 5: MCP session preflight (event-triggered, ochre accent) -->
  <line x1="830" y1="186" x2="830" y2="220" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="770" y="122" width="120" height="64" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1.5"/>
  <!-- Ochre left-border accent (connects visually to MCP/Governance layer) -->
  <rect x="770" y="122" width="4" height="64" fill="#C8860E"/>
  <text x="836" y="141" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">MCP session</text>
  <text x="836" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">preflight</text>
  <text x="836" y="173" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">figma:mcp-check</text>
  <text x="836" y="186" text-anchor="middle" font-size="10" fill="#545454">event-triggered</text>
  <text x="830" y="248" text-anchor="middle" font-size="10" fill="#545454">coverage review</text>

  <!-- Axis tick marks at each checkpoint -->
  <line x1="120" y1="214" x2="120" y2="226" stroke="#121212" stroke-width="1.5"/>
  <line x1="270" y1="214" x2="270" y2="226" stroke="#121212" stroke-width="1.5"/>
  <line x1="470" y1="214" x2="470" y2="226" stroke="#121212" stroke-width="1.5"/>
  <line x1="670" y1="214" x2="670" y2="226" stroke="#121212" stroke-width="1.5"/>
  <line x1="830" y1="214" x2="830" y2="226" stroke="#121212" stroke-width="1.5"/>

  <!-- Recurring loop arrow (below axis, dashed, returns right to left) -->
  <path d="M 880 240 C 880 290, 60 290, 60 240" fill="none" stroke="#D4D4D4" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrowgray)"/>
  <text x="470" y="310" text-anchor="middle" font-size="11" fill="#545454">recurring cadence — the audit is not a one-time event</text>

  <!-- Legend: red = always human review / gray fill = scheduled -->
  <rect x="60" y="326" width="12" height="12" fill="#C8102E"/>
  <text x="80" y="337" font-size="11" fill="#545454">always requires human review</text>
  <rect x="240" y="326" width="12" height="12" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="260" y="337" font-size="11" fill="#545454">scheduled / informational</text>
  <rect x="420" y="326" width="12" height="12" fill="#C8860E"/>
  <text x="440" y="337" font-size="11" fill="#545454">MCP / governance checkpoint</text>

  <!-- caption -->
  <text x="40" y="360" font-size="13" fill="#545454">The five recurring governance checkpoints form a repeating rhythm; red markers indicate checkpoints where human review is always required</text>
  <text x="40" y="376" font-size="13" fill="#545454">before any artifact advances. The loop arrow signals this is a steady-state cadence, not a one-time pipeline.</text>
</svg>
