<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="420" fill="#FFFFFF"/>

  <!-- eyebrow / title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 10.1</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">Button variant property table</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ── METADATA BAR ── -->
  <rect x="40" y="110" width="880" height="36" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="60" y="133" font-size="13" font-weight="700" fill="#121212">Button</text>
  <text x="130" y="133" font-size="13" fill="#545454">component set</text>
  <text x="290" y="133" font-size="13" fill="#545454">·</text>
  <text x="306" y="133" font-size="13" fill="#545454">36 variants</text>
  <text x="420" y="133" font-size="13" fill="#545454">·</text>
  <text x="436" y="133" font-size="13" fill="#545454">description populated</text>
  <!-- checkmark in red -->
  <text x="626" y="133" font-size="13" font-weight="700" fill="#C8102E">✓</text>

  <!-- ── TABLE ── -->

  <!-- Table outer border -->
  <rect x="40" y="146" width="880" height="200" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>

  <!-- HEADER ROW -->
  <rect x="40" y="146" width="880" height="40" fill="#121212"/>
  <line x1="260" y1="146" x2="260" y2="346" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Dimension</text>
  <text x="590" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF" letter-spacing="0.5">Values</text>

  <!-- ROW 1: Variant (alternating fill #F5F5F5) -->
  <rect x="40" y="186" width="880" height="40" fill="#F5F5F5"/>
  <line x1="40" y1="186" x2="920" y2="186" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="211" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Variant</text>
  <text x="590" y="211" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#121212">Primary,  Secondary,  Destructive</text>

  <!-- ROW 2: Size (white) -->
  <rect x="40" y="226" width="880" height="40" fill="#FFFFFF"/>
  <line x1="40" y1="226" x2="920" y2="226" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="251" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Size</text>
  <text x="590" y="251" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#121212">sm,  md,  lg</text>

  <!-- ROW 3: State (alternating #F5F5F5) -->
  <rect x="40" y="266" width="880" height="40" fill="#F5F5F5"/>
  <line x1="40" y1="266" x2="920" y2="266" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="291" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">State</text>
  <text x="590" y="291" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#121212">Default,  Hover,  Pressed,  Disabled</text>

  <!-- ROW 4: Icon (white) -->
  <rect x="40" y="306" width="880" height="40" fill="#FFFFFF"/>
  <line x1="40" y1="306" x2="920" y2="306" stroke="#D4D4D4" stroke-width="1"/>
  <text x="150" y="331" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Icon</text>
  <text x="590" y="331" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#121212">None,  Left,  Right</text>

  <!-- bottom border of table -->
  <line x1="40" y1="346" x2="920" y2="346" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ── ANNOTATION: source field note ── -->
  <text x="40" y="370" font-size="11" fill="#545454">Source field: </text>
  <text x="121" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">variantProperties</text>
  <text x="266" y="370" font-size="11" fill="#545454"> key on each component node in the Figma API response · emitted as </text>
  <text x="726" y="370" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">variant-tables.json</text>

  <!-- caption -->
  <text x="40" y="406" font-size="13" fill="#545454">The variant property table for a Button component set as emitted by variant-tables.json — four dimensions with their complete value enumerations, ready for a documentation platform to render.</text>
</svg>
