<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="WCAG 2.1 contrast threshold reference chart showing pass and fail zones for normal and large text">
  <title>WCAG 2.1 Contrast Threshold Reference</title>
  <desc>Horizontal band chart showing WCAG 2.1 §1.4.3 normative contrast ratio thresholds for normal text and large text, with AA and AAA conformance zones. The chapter's 2.9:1 example failure is marked.</desc>

  <!-- canvas -->
  <rect width="960" height="440" fill="#FFFFFF"/>

  <!-- eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 11.1</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">WCAG 2.1 contrast threshold reference</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ============================================================
       CHART LAYOUT
       X axis: ratio 1:1 → 10:1
       Plot area: x=200..900, y=120..340 (bands); axis at y=360
       Scale: (ratio - 1) / 9 * 700 + 200
         ratio=1  → x=200
         ratio=3  → x=355.6
         ratio=4.5→ x=466.7
         ratio=7  → x=644.4
         ratio=10 → x=900
  ============================================================ -->

  <!-- computed x positions for key values -->
  <!-- x = 200 + (ratio - 1) / 9 * 700 -->
  <!-- ratio=1:  x=200 -->
  <!-- ratio=2.9: x=200 + 1.9/9*700 = 200+147.8 = 347.8 -->
  <!-- ratio=3:  x=200 + 2/9*700 = 200+155.6 = 355.6 -->
  <!-- ratio=4.5: x=200 + 3.5/9*700 = 200+272.2 = 472.2 -->
  <!-- ratio=7:  x=200 + 6/9*700 = 200+466.7 = 666.7 -->
  <!-- ratio=10: x=900 -->

  <!-- ROW A — Normal text (y=130 to y=210) -->
  <!-- FAIL zone: 1–4.5 -->
  <rect x="200" y="130" width="272" height="80" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- AA PASS zone: 4.5–7 -->
  <rect x="472" y="130" width="194" height="80" fill="#D4D4D4" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- AAA PASS zone: 7–10 -->
  <rect x="666" y="130" width="234" height="80" fill="#ADADAD" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Row A border -->
  <rect x="200" y="130" width="700" height="80" fill="none" stroke="#121212" stroke-width="1"/>

  <!-- Row A labels -->
  <text x="196" y="162" text-anchor="end" font-size="11" fill="#121212" font-weight="600">Normal text</text>
  <text x="196" y="178" text-anchor="end" font-size="10" fill="#545454">&lt; 18pt regular</text>
  <text x="196" y="192" text-anchor="end" font-size="10" fill="#545454">&lt; 14pt bold</text>
  <!-- zone labels row A -->
  <text x="336" y="174" text-anchor="middle" font-size="11" fill="#545454">FAIL</text>
  <text x="569" y="174" text-anchor="middle" font-size="11" fill="#121212" font-weight="600">AA PASS</text>
  <text x="783" y="174" text-anchor="middle" font-size="11" fill="#121212" font-weight="600">AAA PASS</text>

  <!-- ROW B — Large text (y=230 to y=310) -->
  <!-- FAIL zone: 1–3 -->
  <rect x="200" y="230" width="156" height="80" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- AA PASS zone: 3–4.5 -->
  <rect x="356" y="230" width="116" height="80" fill="#D4D4D4" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- AAA PASS zone: 4.5–10 -->
  <rect x="472" y="230" width="428" height="80" fill="#ADADAD" stroke="#D4D4D4" stroke-width="0.75"/>

  <!-- Row B border -->
  <rect x="200" y="230" width="700" height="80" fill="none" stroke="#121212" stroke-width="1"/>

  <!-- Row B labels -->
  <text x="196" y="262" text-anchor="end" font-size="11" fill="#121212" font-weight="600">Large text</text>
  <text x="196" y="278" text-anchor="end" font-size="10" fill="#545454">≥ 18pt regular</text>
  <text x="196" y="292" text-anchor="end" font-size="10" fill="#545454">≥ 14pt bold</text>
  <!-- zone labels row B -->
  <text x="278" y="274" text-anchor="middle" font-size="11" fill="#545454">FAIL</text>
  <text x="414" y="274" text-anchor="middle" font-size="10" fill="#121212" font-weight="600">AA</text>
  <text x="686" y="274" text-anchor="middle" font-size="11" fill="#121212" font-weight="600">AAA PASS</text>

  <!-- X AXIS -->
  <line x1="200" y1="330" x2="900" y2="330" stroke="#121212" stroke-width="1"/>

  <!-- Tick marks and labels -->
  <!-- ratio=1 x=200 -->
  <line x1="200" y1="325" x2="200" y2="335" stroke="#121212" stroke-width="0.75"/>
  <text x="200" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">1:1</text>

  <!-- ratio=3 x=355.6 -->
  <line x1="356" y1="325" x2="356" y2="335" stroke="#121212" stroke-width="0.75"/>
  <text x="356" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">3:1</text>

  <!-- ratio=4.5 x=472.2 -->
  <line x1="472" y1="325" x2="472" y2="335" stroke="#121212" stroke-width="0.75"/>
  <text x="472" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">4.5:1</text>

  <!-- ratio=7 x=666.7 -->
  <line x1="667" y1="325" x2="667" y2="335" stroke="#121212" stroke-width="0.75"/>
  <text x="667" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">7:1</text>

  <!-- ratio=10 x=900 -->
  <line x1="900" y1="325" x2="900" y2="335" stroke="#121212" stroke-width="0.75"/>
  <text x="900" y="350" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">10:1</text>

  <!-- Axis label -->
  <text x="550" y="375" text-anchor="middle" font-size="11" fill="#545454">Contrast ratio — (L<tspan baseline-shift="sub" font-size="9">lighter</tspan> + 0.05) / (L<tspan baseline-shift="sub" font-size="9">darker</tspan> + 0.05)</text>

  <!-- THRESHOLD DIVIDERS — vertical rules at 3, 4.5, 7 -->
  <line x1="356" y1="130" x2="356" y2="330" stroke="#121212" stroke-width="1"/>
  <line x1="472" y1="130" x2="472" y2="330" stroke="#121212" stroke-width="1"/>
  <line x1="667" y1="130" x2="667" y2="330" stroke="#121212" stroke-width="1"/>

  <!-- THRESHOLD ANNOTATIONS -->
  <!-- 3:1 large AA -->
  <text x="356" y="116" text-anchor="middle" font-size="10" fill="#545454">3:1</text>
  <text x="356" y="127" text-anchor="middle" font-size="10" fill="#545454">large AA</text>

  <!-- 4.5:1 normal AA / large AAA -->
  <text x="472" y="110" text-anchor="middle" font-size="10" fill="#545454">4.5:1 normal AA /</text>
  <text x="472" y="122" text-anchor="middle" font-size="10" fill="#545454">large AAA</text>

  <!-- 7:1 normal AAA -->
  <text x="667" y="116" text-anchor="middle" font-size="10" fill="#545454">7:1</text>
  <text x="667" y="127" text-anchor="middle" font-size="10" fill="#545454">normal AAA</text>

  <!-- EXAMPLE MARKER — 2.9:1, x=347.8 ≈ 348 -->
  <!-- dashed vertical rule crossing Normal text row -->
  <line x1="348" y1="120" x2="348" y2="330" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- marker label -->
  <text x="295" y="116" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#C8102E" font-weight="700">2.9:1</text>
  <text x="295" y="128" text-anchor="middle" font-size="9" fill="#C8102E">chapter example</text>
  <!-- small leader from label to rule -->
  <line x1="328" y1="122" x2="346" y2="130" stroke="#C8102E" stroke-width="0.75"/>

  <!-- SOURCE NOTE -->
  <text x="40" y="410" font-size="10" letter-spacing="0.5" fill="#545454" font-weight="700">SOURCE: WCAG 2.1 §1.4.3 — NORMATIVE</text>

  <!-- CAPTION -->
  <text x="40" y="428" font-size="13" fill="#545454">WCAG 2.1 §1.4.3 defines four normative thresholds; <tspan font-family="JetBrains Mono, monospace">monitor-brand.mjs</tspan> checks every text node against these exact ratios. 2.9:1 — the chapter's failure — falls in the normal-text fail zone.</text>
</svg>
