<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="Figure 14.2: CLI Commands and Audit Cadence Table">
  <title>Figure 14.2 — CLI Commands and Audit Cadence Table</title>
  <desc>The five audit trigger events — pull request, merge, weekly schedule, pre-release, and MCP session — each map to a defined set of CLI commands, output artifacts, and human-review requirements; "Always" cells mark decisions that cannot be automated.</desc>
  <rect width="960" height="480" fill="#FFFFFF"/>

  <!-- eyebrow / title / rule -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 14.2</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">CLI commands and audit cadence</text>
  <line x1="40" y1="90" x2="920" y2="90" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Table outer border -->
  <rect x="40" y="106" width="880" height="332" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Header row -->
  <rect x="40" y="106" width="880" height="36" fill="#121212"/>
  <text x="112" y="129" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="14" fill="#FFFFFF">Trigger</text>
  <text x="342" y="129" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="14" fill="#FFFFFF">Commands run</text>
  <text x="606" y="129" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="14" fill="#FFFFFF">Output artifact</text>
  <text x="826" y="129" text-anchor="middle" font-family="EB Garamond, Georgia, serif" font-size="14" fill="#FFFFFF">Human review required</text>

  <!-- Column dividers in header -->
  <line x1="184" y1="106" x2="184" y2="438" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="500" y1="106" x2="500" y2="438" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="714" y1="106" x2="714" y2="438" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 1: PR — white background -->
  <rect x="40" y="142" width="880" height="56" fill="#FFFFFF"/>
  <text x="112" y="164" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Pull request</text>
  <text x="112" y="182" text-anchor="middle" font-size="11" fill="#545454">event-triggered</text>
  <text x="342" y="162" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:preflight</text>
  <text x="342" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">(figma:ping + figma:audit)</text>
  <text x="606" y="164" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">audit.json</text>
  <text x="606" y="180" text-anchor="middle" font-size="11" fill="#545454">posted as PR comment</text>
  <!-- Human review: blocking errors only -->
  <rect x="714" y="142" width="206" height="56" fill="#F5F5F5"/>
  <text x="817" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Blocking errors only</text>
  <text x="817" y="185" text-anchor="middle" font-size="11" fill="#545454">warnings reported; do not block</text>

  <!-- Row divider -->
  <line x1="40" y1="198" x2="920" y2="198" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 2: Merge to main — F5F5F5 background -->
  <rect x="40" y="198" width="880" height="64" fill="#F5F5F5"/>
  <text x="112" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Merge to main</text>
  <text x="112" y="238" text-anchor="middle" font-size="11" fill="#545454">event-triggered</text>
  <!-- Commands (two lines) -->
  <text x="342" y="218" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:preflight + figma:tokens</text>
  <text x="342" y="234" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:assets + figma:spec</text>
  <text x="342" y="250" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:docs</text>
  <!-- Output artifacts -->
  <text x="606" y="218" text-anchor="middle" font-size="11" fill="#545454">token PR · asset PR</text>
  <text x="606" y="234" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">spec.json</text>
  <text x="606" y="250" text-anchor="middle" font-size="11" fill="#545454">artifact</text>
  <!-- Human review: Always (red) -->
  <rect x="714" y="198" width="206" height="64" fill="#C8102E"/>
  <text x="817" y="227" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Always</text>
  <text x="817" y="246" text-anchor="middle" font-size="11" fill="#FFFFFF">review PR diff before</text>
  <text x="817" y="260" text-anchor="middle" font-size="11" fill="#FFFFFF">merging to distribution</text>

  <!-- Row divider -->
  <line x1="40" y1="262" x2="920" y2="262" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 3: Weekly — white background -->
  <rect x="40" y="262" width="880" height="56" fill="#FFFFFF"/>
  <text x="112" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Weekly scheduled</text>
  <text x="112" y="302" text-anchor="middle" font-size="11" fill="#545454">cron: Mon 9am UTC</text>
  <text x="342" y="284" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:audit + figma:brand</text>
  <text x="606" y="284" text-anchor="middle" font-size="11" fill="#545454">audit report</text>
  <text x="606" y="300" text-anchor="middle" font-size="11" fill="#545454">brand-compliance report</text>
  <!-- Human review: errors only -->
  <rect x="714" y="262" width="206" height="56" fill="#F5F5F5"/>
  <text x="817" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Errors only</text>
  <text x="817" y="305" text-anchor="middle" font-size="11" fill="#545454">informational; no merge required</text>

  <!-- Row divider -->
  <line x1="40" y1="318" x2="920" y2="318" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 4: Pre-release — F5F5F5 background -->
  <rect x="40" y="318" width="880" height="64" fill="#F5F5F5"/>
  <text x="112" y="340" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">Pre-release</text>
  <text x="112" y="358" text-anchor="middle" font-size="11" fill="#545454">event-triggered</text>
  <text x="342" y="337" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#545454">figma:full</text>
  <text x="342" y="355" text-anchor="middle" font-size="10" fill="#545454">(preflight + tokens + assets</text>
  <text x="342" y="371" text-anchor="middle" font-size="10" fill="#545454">+ docs + brand + spec)</text>
  <text x="606" y="338" text-anchor="middle" font-size="11" fill="#545454">full pipeline output</text>
  <text x="606" y="354" text-anchor="middle" font-size="11" fill="#545454">release checklist</text>
  <!-- Human review: Always (red) -->
  <rect x="714" y="318" width="206" height="64" fill="#C8102E"/>
  <text x="817" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">Always</text>
  <text x="817" y="362" text-anchor="middle" font-size="11" fill="#FFFFFF">every blocking error resolved;</text>
  <text x="817" y="378" text-anchor="middle" font-size="11" fill="#FFFFFF">every warning triaged</text>

  <!-- Row divider -->
  <line x1="40" y1="382" x2="920" y2="382" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Row 5: MCP session — white background -->
  <rect x="40" y="382" width="880" height="56" fill="#FFFFFF"/>
  <text x="112" y="404" text-anchor="middle" font-size="13" font-weight="600" fill="#121212">MCP session</text>
  <text x="112" y="422" text-anchor="middle" font-size="11" fill="#545454">before each agent session</text>
  <text x="342" y="408" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma:mcp-check</text>
  <text x="606" y="404" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">figma-mcp-check.md</text>
  <text x="606" y="420" text-anchor="middle" font-size="11" fill="#545454">committed to repo</text>
  <!-- Human review: coverage review -->
  <rect x="714" y="382" width="206" height="56" fill="#F5F5F5"/>
  <text x="817" y="406" text-anchor="middle" font-size="12" font-weight="600" fill="#121212">Coverage review</text>
  <text x="817" y="422" text-anchor="middle" font-size="11" fill="#545454">Code Connect gaps reviewed;</text>
  <text x="817" y="436" text-anchor="middle" font-size="11" fill="#545454">output committed</text>

  <!-- caption -->
  <text x="40" y="460" font-size="13" fill="#545454">The five audit trigger events each map to a defined set of CLI commands, output artifacts, and human-review requirements;</text>
  <text x="40" y="476" font-size="13" fill="#545454">"Always" cells (red) mark decisions that cannot be automated.</text>
</svg>
