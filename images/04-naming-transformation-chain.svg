<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="480" fill="#FFFFFF"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- eyebrow / title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 4.1</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The naming transformation chain</text>
  <line x1="40" y1="92" x2="920" y2="92" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Stage labels (row 1) -->
  <text x="100" y="126" text-anchor="middle" font-size="12" fill="#545454" font-weight="700">Figma variable</text>
  <text x="310" y="126" text-anchor="middle" font-size="12" fill="#545454" font-weight="700">REST API</text>
  <text x="530" y="126" text-anchor="middle" font-size="12" fill="#545454" font-weight="700">Style Dictionary parse</text>
  <text x="780" y="126" text-anchor="middle" font-size="12" fill="#545454" font-weight="700">Platform formatters</text>

  <!-- Node 1: Figma variable (source, slightly emphasized) -->
  <rect x="40" y="136" width="122" height="90" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="101" y="162" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#121212">color/brand/</text>
  <text x="101" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#121212">primary</text>
  <line x1="50" y1="189" x2="152" y2="189" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="101" y="208" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">value: #0066ff</text>

  <!-- Arrow 1 → 2 -->
  <line x1="162" y1="181" x2="228" y2="181" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="195" y="172" text-anchor="middle" font-size="10" fill="#545454">name</text>
  <text x="195" y="183" text-anchor="middle" font-size="10" fill="#545454">unchanged</text>

  <!-- Node 2: REST API -->
  <rect x="230" y="136" width="160" height="90" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="310" y="162" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">GET /v1/files/:key/</text>
  <text x="310" y="176" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">variables/local</text>
  <line x1="240" y1="189" x2="380" y2="189" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="310" y="208" text-anchor="middle" font-size="11" fill="#545454">name property</text>
  <text x="310" y="220" text-anchor="middle" font-size="11" fill="#545454">returned as-is</text>

  <!-- Arrow 2 → 3 -->
  <line x1="390" y1="181" x2="428" y2="181" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 3: Style Dictionary parse -->
  <rect x="430" y="136" width="200" height="110" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="530" y="158" text-anchor="middle" font-size="11" fill="#545454">splits slash path →</text>
  <text x="530" y="172" text-anchor="middle" font-size="11" fill="#545454">nested object</text>
  <line x1="440" y1="181" x2="620" y2="181" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="530" y="197" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">{ color: { brand:</text>
  <text x="530" y="211" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">{ primary: {</text>
  <text x="530" y="225" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">$value } } } }</text>

  <!-- Arrow 3 → 4 -->
  <line x1="630" y1="181" x2="688" y2="181" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node 4: Platform formatters (central fan-out node) -->
  <rect x="690" y="136" width="180" height="70" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="780" y="165" text-anchor="middle" font-size="13" font-weight="700" fill="#121212">Platform</text>
  <text x="780" y="183" text-anchor="middle" font-size="13" font-weight="700" fill="#121212">formatters</text>

  <!-- Fan-out connector line down from platform formatters -->
  <line x1="780" y1="206" x2="780" y2="236" stroke="#121212" stroke-width="1.5"/>
  <line x1="590" y1="236" x2="920" y2="236" stroke="#121212" stroke-width="1.5"/>

  <!-- Fan-out arrows to three output nodes -->
  <!-- → CSS -->
  <line x1="620" y1="236" x2="620" y2="268" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- → Swift -->
  <line x1="780" y1="236" x2="780" y2="268" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- → Android -->
  <line x1="900" y1="236" x2="900" y2="268" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output node: CSS -->
  <rect x="530" y="270" width="180" height="90" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="620" y="293" text-anchor="middle" font-size="12" font-weight="700" fill="#121212">CSS</text>
  <line x1="540" y1="300" x2="700" y2="300" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="620" y="322" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">--color-brand-</text>
  <text x="620" y="338" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">primary: #0066ff</text>

  <!-- Output node: Swift -->
  <rect x="690" y="270" width="180" height="90" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="780" y="293" text-anchor="middle" font-size="12" font-weight="700" fill="#121212">Swift</text>
  <line x1="700" y1="300" x2="860" y2="300" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="780" y="322" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">colorBrandPrimary</text>
  <text x="780" y="338" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">lowerCamelCase</text>

  <!-- Output node: Android XML -->
  <rect x="850" y="270" width="70" height="90" fill="#FFFFFF" stroke="#C8102E" stroke-width="1.5"/>
  <text x="885" y="289" text-anchor="middle" font-size="11" font-weight="700" fill="#121212">Android</text>
  <text x="885" y="303" text-anchor="middle" font-size="11" font-weight="700" fill="#121212">XML</text>
  <line x1="860" y1="310" x2="910" y2="310" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="885" y="326" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#545454">color_brand_</text>
  <text x="885" y="340" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#545454">primary</text>

  <!-- Simultaneity annotation -->
  <text x="730" y="395" text-anchor="middle" font-size="11" fill="#545454" font-style="italic">three outputs simultaneously — not sequential</text>

  <!-- caption -->
  <text x="40" y="464" font-size="13" fill="#545454">A well-formed Figma variable name passes through four deterministic stages and lands as a valid identifier on every target platform simultaneously.</text>
</svg>
