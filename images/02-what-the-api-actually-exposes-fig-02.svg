<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="fig-title-ch2-02 fig-desc-ch2-02">
  <title id="fig-title-ch2-02">figma-ping.js terminal output showing PASS/WARN/FAIL states for a healthy non-Enterprise session</title>
  <desc id="fig-desc-ch2-02">Annotated terminal output from figma-ping.js showing five checks: environment (PASS), auth (PASS), file access (PASS), variables API (WARN — plan gate), and rate limit (informational), with callouts identifying which checks are auth, plan-gate, and rate-limit related.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000000"/>
    </marker>
  </defs>

  <!-- Canvas background -->
  <rect width="700" height="420" fill="#FFFFFF"/>

  <!-- Terminal window -->
  <rect x="32" y="32" width="400" height="340" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <!-- Terminal chrome -->
  <rect x="32" y="32" width="400" height="24" fill="#000000"/>
  <text x="232" y="48" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle">figma-ping.js</text>

  <!-- Terminal text -->
  <text x="48" y="78" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">=== figma-ping: session health check ===</text>

  <text x="48" y="100" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#555555">Checking: environment</text>
  <text x="48" y="114" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">  PASS FIGMA_TOKEN is set (figd_a...)</text>
  <text x="48" y="128" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">  PASS FIGMA_FILE_KEY is set (abc123XYZ)</text>

  <text x="48" y="150" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#555555">Checking: auth: GET /v1/me</text>
  <text x="48" y="164" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">  PASS auth: GET /v1/me (200)</text>

  <text x="48" y="186" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#555555">Checking: file access</text>
  <text x="48" y="200" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">  PASS file access: GET /v1/files/...?depth=1</text>

  <text x="48" y="222" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#555555">Checking: variables API</text>
  <text x="48" y="236" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#A0522D">  WARN variables API: HTTP 403</text>
  <text x="48" y="250" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#A0522D">  Plan is not Enterprise.</text>
  <text x="48" y="264" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#A0522D">  Use Tokens Studio instead (Ch 8).</text>

  <text x="48" y="286" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#555555">  Rate limit headers not present.</text>

  <text x="48" y="308" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">=== figma-ping complete ===</text>
  <text x="48" y="322" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="9" fill="#000000">Your session is healthy. Proceed.</text>

  <!-- Callout annotations on right side -->

  <!-- Environment callout -->
  <line x1="432" y1="114" x2="460" y2="114" stroke="#000000" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="460" y="96" width="176" height="36" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="548" y="112" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">Environment check</text>
  <text x="548" y="126" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">FIGMA_TOKEN · FIGMA_FILE_KEY</text>

  <!-- Auth token callout -->
  <line x1="432" y1="157" x2="460" y2="157" stroke="#000000" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="460" y="146" width="176" height="28" fill="#F5F5F5" stroke="#C8102E" stroke-width="1"/>
  <text x="548" y="158" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#C8102E" text-anchor="middle">Auth check</text>
  <text x="548" y="170" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">GET /v1/me — token valid?</text>

  <!-- File access callout -->
  <line x1="432" y1="193" x2="460" y2="193" stroke="#000000" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="460" y="182" width="176" height="28" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="548" y="194" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">File access check</text>
  <text x="548" y="206" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">GET /v1/files/:key?depth=1</text>

  <!-- Plan gate callout -->
  <line x1="432" y1="243" x2="460" y2="243" stroke="#A0522D" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="460" y="228" width="176" height="40" fill="#F5F5F5" stroke="#A0522D" stroke-width="1"/>
  <text x="548" y="242" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#A0522D" text-anchor="middle">Plan gate (non-fatal)</text>
  <text x="548" y="254" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">Enterprise required for</text>
  <text x="548" y="265" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">Variables REST API</text>

  <!-- Rate limit callout -->
  <line x1="432" y1="286" x2="460" y2="286" stroke="#000000" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <rect x="460" y="275" width="176" height="28" fill="#F5F5F5" stroke="#CCCCCC" stroke-width="0.75"/>
  <text x="548" y="287" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" font-weight="700" fill="#000000" text-anchor="middle">Rate limit headroom</text>
  <text x="548" y="299" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="9" fill="#555555" text-anchor="middle">From response headers</text>

  <!-- Bottom caption -->
  <text x="350" y="394" font-family="'Real Head Pro','FF Real',Lato,sans-serif" font-size="10" fill="#555555" text-anchor="middle">A healthy non-Enterprise session: auth PASS, file PASS, variables WARN (expected).</text>
</svg>
