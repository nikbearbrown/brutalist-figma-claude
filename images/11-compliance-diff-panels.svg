<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="Compliance diff comparison: baseline run versus current run showing 16 resolved findings and 0 new">
  <title>Compliance Diff: Baseline vs. Current Run</title>
  <desc>Two-panel comparison showing a baseline compliance run with 47 findings versus a current run with 31 findings, with a center spine showing 16 resolved and 0 new findings, and the compliance-diff.json artifact label.</desc>

  <!-- canvas -->
  <rect width="960" height="500" fill="#FFFFFF"/>

  <!-- eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 11.2</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">Compliance diff: baseline vs. current run</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- ============================================================
       TWO PANELS — separated by a center spine at x=480
       Left panel:  x=40..460
       Right panel: x=500..920
       Center spine: x=460..500 (40px wide)
  ============================================================ -->

  <!-- LEFT PANEL BACKGROUND -->
  <rect x="40" y="112" width="420" height="340" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

  <!-- LEFT PANEL HEADER -->
  <rect x="40" y="112" width="420" height="36" fill="#121212"/>
  <text x="250" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Baseline run</text>
  <text x="250" y="149" text-anchor="middle" font-size="10" fill="#D4D4D4" font-family="JetBrains Mono, monospace">2024-11-15T09:00:00Z</text>

  <!-- LEFT SUMMARY ROW -->
  <rect x="40" y="148" width="420" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0" stroke-bottom="1"/>
  <line x1="40" y1="184" x2="460" y2="184" stroke="#D4D4D4" stroke-width="1"/>
  <text x="56" y="170" font-size="12" font-weight="700" fill="#121212">47 findings</text>
  <text x="170" y="170" font-size="11" fill="#545454">12 errors</text>
  <text x="240" y="170" font-size="11" fill="#545454">28 warnings</text>
  <text x="330" y="170" font-size="11" fill="#545454">7 info</text>

  <!-- LEFT FINDING ROWS -->
  <!-- Row 1: contrast-failure -->
  <rect x="40" y="184" width="420" height="52" fill="#FFFFFF"/>
  <line x1="40" y1="236" x2="460" y2="236" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="40" y="184" width="4" height="52" fill="#121212"/>
  <text x="56" y="202" font-size="11" font-weight="600" fill="#121212">CTA Button / label-text</text>
  <text x="56" y="218" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">contrast-failure · 2.9:1 fails AA (4.5:1 required)</text>
  <rect x="390" y="191" width="56" height="16" fill="#121212" rx="0"/>
  <text x="418" y="203" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">ERROR</text>

  <!-- Row 2: hardcoded-unapproved-color -->
  <rect x="40" y="236" width="420" height="52" fill="#F5F5F5"/>
  <line x1="40" y1="288" x2="460" y2="288" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="40" y="236" width="4" height="52" fill="#545454"/>
  <text x="56" y="254" font-size="11" font-weight="600" fill="#121212">Card / background</text>
  <text x="56" y="270" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">hardcoded-unapproved-color · #2D3748 not in palette</text>
  <rect x="376" y="243" width="70" height="16" fill="#545454" rx="0"/>
  <text x="411" y="255" text-anchor="middle" font-size="10" fill="#FFFFFF" font-weight="600">WARNING</text>

  <!-- Row 3: off-scale-spacing -->
  <rect x="40" y="288" width="420" height="52" fill="#FFFFFF"/>
  <line x1="40" y1="340" x2="460" y2="340" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="40" y="288" width="4" height="52" fill="#D4D4D4"/>
  <text x="56" y="306" font-size="11" font-weight="600" fill="#121212">Nav / wrapper frame</text>
  <text x="56" y="322" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">off-scale-spacing · paddingLeft=18 not in scale</text>
  <rect x="402" y="295" width="44" height="16" fill="#D4D4D4" rx="0"/>
  <text x="424" y="307" text-anchor="middle" font-size="10" fill="#121212" font-weight="600">INFO</text>

  <!-- Left panel footer -->
  <rect x="40" y="340" width="420" height="112" fill="#F5F5F5"/>
  <text x="250" y="372" text-anchor="middle" font-size="11" fill="#545454">+44 additional findings not shown</text>
  <text x="250" y="392" text-anchor="middle" font-size="11" fill="#545454">Full report: <tspan font-family="JetBrains Mono, monospace">compliance-report.json</tspan></text>

  <!-- RIGHT PANEL BACKGROUND -->
  <rect x="500" y="112" width="420" height="340" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>

  <!-- RIGHT PANEL HEADER -->
  <rect x="500" y="112" width="420" height="36" fill="#121212"/>
  <text x="710" y="135" text-anchor="middle" font-size="13" font-weight="600" fill="#FFFFFF">Current run</text>
  <text x="710" y="149" text-anchor="middle" font-size="10" fill="#D4D4D4" font-family="JetBrains Mono, monospace">2024-11-22T09:00:00Z</text>

  <!-- RIGHT SUMMARY ROW -->
  <rect x="500" y="148" width="420" height="36" fill="#FFFFFF"/>
  <line x1="500" y1="184" x2="920" y2="184" stroke="#D4D4D4" stroke-width="1"/>
  <text x="516" y="170" font-size="12" font-weight="700" fill="#121212">31 findings</text>
  <text x="630" y="170" font-size="11" fill="#545454">4 errors</text>
  <text x="690" y="170" font-size="11" fill="#545454">22 warnings</text>
  <text x="780" y="170" font-size="11" fill="#545454">5 info</text>

  <!-- RIGHT FINDING ROWS — same categories, marked resolved with red left accent -->
  <!-- Row 1: contrast-failure RESOLVED -->
  <rect x="500" y="184" width="420" height="52" fill="#FFFFFF"/>
  <line x1="500" y1="236" x2="920" y2="236" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="500" y="184" width="3" height="52" fill="#C8102E"/>
  <text x="516" y="202" font-size="11" font-weight="600" fill="#121212">CTA Button / label-text</text>
  <text x="516" y="218" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">contrast-failure · resolved — style ref applied</text>
  <rect x="842" y="191" width="64" height="16" fill="#F5F5F5" stroke="#C8102E" stroke-width="1" rx="0"/>
  <text x="874" y="203" text-anchor="middle" font-size="10" fill="#C8102E" font-weight="600">RESOLVED</text>

  <!-- Row 2: hardcoded-unapproved-color RESOLVED -->
  <rect x="500" y="236" width="420" height="52" fill="#F5F5F5"/>
  <line x1="500" y1="288" x2="920" y2="288" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="500" y="236" width="3" height="52" fill="#C8102E"/>
  <text x="516" y="254" font-size="11" font-weight="600" fill="#121212">Card / background</text>
  <text x="516" y="270" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">hardcoded-unapproved-color · resolved</text>
  <rect x="842" y="243" width="64" height="16" fill="#F5F5F5" stroke="#C8102E" stroke-width="1" rx="0"/>
  <text x="874" y="255" text-anchor="middle" font-size="10" fill="#C8102E" font-weight="600">RESOLVED</text>

  <!-- Row 3: off-scale-spacing STILL PRESENT -->
  <rect x="500" y="288" width="420" height="52" fill="#FFFFFF"/>
  <line x1="500" y1="340" x2="920" y2="340" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="500" y="288" width="4" height="52" fill="#D4D4D4"/>
  <text x="516" y="306" font-size="11" font-weight="600" fill="#121212">Nav / wrapper frame</text>
  <text x="516" y="322" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454">off-scale-spacing · paddingLeft=18 — remains open</text>
  <rect x="862" y="295" width="44" height="16" fill="#D4D4D4" rx="0"/>
  <text x="884" y="307" text-anchor="middle" font-size="10" fill="#121212" font-weight="600">INFO</text>

  <!-- Right panel footer -->
  <rect x="500" y="340" width="420" height="112" fill="#F5F5F5"/>
  <text x="710" y="372" text-anchor="middle" font-size="11" fill="#545454">+28 additional findings not shown</text>
  <text x="710" y="392" text-anchor="middle" font-size="11" fill="#545454">Full report: <tspan font-family="JetBrains Mono, monospace">compliance-report.json</tspan></text>

  <!-- CENTER SPINE -->
  <rect x="460" y="112" width="40" height="340" fill="#FFFFFF"/>
  <line x1="480" y1="112" x2="480" y2="452" stroke="#121212" stroke-width="2"/>

  <!-- DIFF CALLOUT on center spine -->
  <!-- resolved badge -->
  <rect x="447" y="215" width="66" height="28" fill="#C8102E"/>
  <text x="480" y="233" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">16 ↑</text>
  <text x="480" y="255" text-anchor="middle" font-size="10" fill="#545454">resolved</text>

  <!-- new badge -->
  <rect x="455" y="270" width="50" height="24" fill="#121212"/>
  <text x="480" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#FFFFFF">0 new</text>

  <!-- artifact label below spine -->
  <text x="480" y="476" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">compliance-diff.json</text>
  <!-- small tick down from spine to label -->
  <line x1="480" y1="452" x2="480" y2="464" stroke="#D4D4D4" stroke-width="1"/>

  <!-- CAPTION -->
  <text x="40" y="496" font-size="13" fill="#545454">Diffing two compliance runs reveals 16 resolved findings and 0 new — the design is measurably cleaner; <tspan font-family="JetBrains Mono, monospace">compliance-diff.json</tspan> encodes this delta for CI.</text>
</svg>
