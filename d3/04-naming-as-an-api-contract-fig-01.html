<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transformation chain: one name, four outputs</title>
  <style>
    :root {
      --color-white:     #FFFFFF;
      --color-fill:      #F5F5F5;
      --color-ink:       #000000;
      --color-red:       #C8102E;
      --color-brown:     #A0522D;
      --color-secondary: #555555;
      --color-border:    #CCCCCC;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-white:     #111111;
        --color-fill:      #1E1E1E;
        --color-ink:       #F0F0F0;
        --color-red:       #E8243A;
        --color-brown:     #C07840;
        --color-secondary: #999999;
        --color-border:    #333333;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-white); color: var(--color-ink); font-family: 'Real Head Pro','FF Real',Lato,sans-serif; }
    #chart { width: 100%; }
    .tooltip {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      padding: 8px 12px;
      font-family: 'Real Head Pro','FF Real',Lato,sans-serif;
      font-size: 12px;
      color: var(--color-ink);
    }
    @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
  </style>
</head>
<body>
  <div id="chart" role="main"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script>
    const stages = [
      { id: 'figma',     label: 'FIGMA',           sub: 'Variable name',      value: 'color/brand/primary', isInput: true },
      { id: 'api',       label: 'REST API',         sub: 'JSON response',      value: '"name": "color/…"',   isInput: false },
      { id: 'extractor', label: 'STYLE DICTIONARY', sub: 'Nested object',      value: 'color → brand → primary', isInput: false },
      { id: 'formatter', label: 'PLATFORM FMTR',    sub: 'case + prefix rules', value: 'split → case → prefix', isInput: false },
    ];

    const outputs = [
      { platform: 'CSS',     value: '--color-brand-primary', highlight: true },
      { platform: 'Swift',   value: 'colorBrandPrimary',     highlight: false },
      { platform: 'Android', value: 'color_brand_primary',   highlight: false },
      { platform: 'JS',      value: 'color.brand.primary',   highlight: false },
    ];

    const tooltip = d3.select('body').append('div').attr('class', 'tooltip');

    function showTooltip(event, html) {
      tooltip.html(html)
        .style('left', (event.pageX + 12) + 'px')
        .style('top',  (event.pageY - 28) + 'px')
        .transition().duration(150).style('opacity', 1);
    }
    function moveTooltip(event) {
      tooltip.style('left', (event.pageX + 12) + 'px').style('top', (event.pageY - 28) + 'px');
    }
    function hideTooltip() { tooltip.transition().duration(100).style('opacity', 0); }

    function draw() {
      d3.select('#chart').selectAll('*').remove();
      const container = document.getElementById('chart');
      const totalWidth  = container.clientWidth || 800;
      const totalHeight = Math.max(420, totalWidth * 0.55);
      const margin = { top: 48, right: 40, bottom: 56, left: 40 };
      const W = totalWidth  - margin.left - margin.right;
      const H = totalHeight - margin.top  - margin.bottom;

      const svg = d3.select('#chart').append('svg')
        .attr('width',  totalWidth)
        .attr('height', totalHeight)
        .attr('role',   'img')
        .attr('aria-labelledby', 'fig01-title fig01-desc');

      svg.append('title').attr('id', 'fig01-title').text('Transformation chain: one name, four outputs');
      svg.append('desc').attr('id', 'fig01-desc').text('One Figma variable name becomes four platform identifiers through a deterministic transformation chain.');

      const g = svg.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

      // Title
      g.append('text')
        .attr('x', 0).attr('y', -18)
        .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
        .attr('font-size', 13).attr('font-weight', 700)
        .attr('fill', 'var(--color-ink)')
        .text('Transformation chain: one name, four outputs');

      const stageW = 110, stageH = 64, stageGap = 18;
      const stageTotal = stages.length * stageW + (stages.length - 1) * stageGap;
      const stageY = 8;
      const centerY = stageY + stageH / 2;

      // Stage boxes
      const gStages = g.append('g').attr('class', 'g-stages');
      stages.forEach((s, i) => {
        const x = i * (stageW + stageGap);
        const sg = gStages.append('g')
          .attr('class', 'stage-group')
          .attr('tabindex', 0)
          .attr('aria-label', `${s.label}: ${s.value}`)
          .style('cursor', 'default')
          .on('mouseover', (event) => showTooltip(event, `<strong>${s.label}</strong><br/>${s.sub}<br/><em>${s.value}</em>`))
          .on('mousemove', moveTooltip)
          .on('mouseout',  hideTooltip)
          .on('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') showTooltip(event, `<strong>${s.label}</strong><br/>${s.sub}<br/><em>${s.value}</em>`);
          });

        sg.append('rect')
          .attr('x', x).attr('y', stageY)
          .attr('width', stageW).attr('height', stageH)
          .attr('fill', 'var(--color-fill)')
          .attr('stroke', 'var(--color-border)')
          .attr('stroke-width', 0.75);

        sg.append('text')
          .attr('x', x + stageW / 2).attr('y', stageY + 16)
          .attr('text-anchor', 'middle')
          .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
          .attr('font-size', 9).attr('font-weight', 700)
          .attr('fill', 'var(--color-secondary)')
          .attr('letter-spacing', '0.08em')
          .text(s.label);

        sg.append('text')
          .attr('x', x + stageW / 2).attr('y', stageY + 32)
          .attr('text-anchor', 'middle')
          .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
          .attr('font-size', 10)
          .attr('fill', 'var(--color-ink)')
          .text(s.sub);

        sg.append('text')
          .attr('x', x + stageW / 2).attr('y', stageY + 52)
          .attr('text-anchor', 'middle')
          .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
          .attr('font-size', 9)
          .attr('fill', s.isInput ? 'var(--color-red)' : 'var(--color-secondary)')
          .text(s.value);

        // Arrow to next stage
        if (i < stages.length - 1) {
          const ax1 = x + stageW + 2, ax2 = x + stageW + stageGap - 4;
          g.append('line')
            .attr('x1', ax1).attr('y1', centerY)
            .attr('x2', ax2).attr('y2', centerY)
            .attr('stroke', 'var(--color-ink)')
            .attr('stroke-width', 1.5)
            .attr('marker-end', 'url(#arrow-main)')
            .attr('aria-hidden', 'true');
        }
      });

      // Arrow marker
      svg.append('defs').append('marker')
        .attr('id', 'arrow-main')
        .attr('markerWidth', 8).attr('markerHeight', 6)
        .attr('refX', 7).attr('refY', 3)
        .attr('orient', 'auto')
        .append('polygon')
          .attr('points', '0 0, 8 3, 0 6')
          .attr('fill', 'var(--color-ink)');

      // Fan out from last stage to 4 outputs
      const lastX = (stages.length - 1) * (stageW + stageGap) + stageW;
      const outX  = lastX + 48;
      const outW  = 140, outH = 40;
      const outSpacing = H / (outputs.length + 1);

      outputs.forEach((o, i) => {
        const oy = (i + 1) * outSpacing - outH / 2 - 20;
        const midY = oy + outH / 2;

        // Bezier arc from formatter box
        const startX = lastX, startY = centerY;
        const cp1x = lastX + 24, cp1y = startY;
        const cp2x = outX - 12, cp2y = midY;

        g.append('path')
          .attr('d', `M${startX},${startY} C${cp1x},${cp1y} ${cp2x},${cp2y} ${outX - 2},${midY}`)
          .attr('stroke', 'var(--color-ink)')
          .attr('stroke-width', 1.5)
          .attr('fill', 'none')
          .attr('marker-end', 'url(#arrow-main)')
          .attr('aria-hidden', 'true');

        const og = g.append('g')
          .attr('tabindex', 0)
          .attr('aria-label', `${o.platform}: ${o.value}`)
          .on('mouseover', (event) => showTooltip(event, `<strong>${o.platform}</strong><br/>${o.value}`))
          .on('mousemove', moveTooltip)
          .on('mouseout',  hideTooltip)
          .on('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') showTooltip(event, `<strong>${o.platform}</strong><br/>${o.value}`);
          });

        og.append('rect')
          .attr('x', outX).attr('y', oy)
          .attr('width', outW).attr('height', outH)
          .attr('fill', 'var(--color-fill)')
          .attr('stroke', 'var(--color-border)')
          .attr('stroke-width', 0.75);

        og.append('text')
          .attr('x', outX + 8).attr('y', oy + 14)
          .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
          .attr('font-size', 9).attr('font-weight', 700)
          .attr('fill', 'var(--color-secondary)')
          .attr('letter-spacing', '0.08em')
          .text(o.platform);

        og.append('text')
          .attr('x', outX + 8).attr('y', oy + 30)
          .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
          .attr('font-size', 10)
          .attr('fill', o.highlight ? 'var(--color-red)' : 'var(--color-secondary)')
          .text(o.value);
      });

      // Deterministic note
      g.append('line')
        .attr('x1', 0).attr('y1', stageY + stageH + 14)
        .attr('x2', stageTotal).attr('y2', stageY + stageH + 14)
        .attr('stroke', 'var(--color-border)')
        .attr('stroke-width', 0.75)
        .attr('stroke-dasharray', '5 4')
        .attr('aria-hidden', 'true');

      g.append('text')
        .attr('x', 0).attr('y', stageY + stageH + 30)
        .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
        .attr('font-size', 10)
        .attr('fill', 'var(--color-secondary)')
        .text('The transformation is deterministic. Pipeline authors control the rules — not the input name.');

      // Caption
      g.append('text')
        .attr('x', 0).attr('y', H + 36)
        .attr('font-family', "'Real Head Pro','FF Real',Lato,sans-serif")
        .attr('font-size', 10).attr('fill', 'var(--color-secondary)')
        .text('One string in Figma becomes four identifiers simultaneously through a deterministic transformation chain.');
    }

    draw();
    const ro = new ResizeObserver(() => draw());
    ro.observe(document.getElementById('chart'));
  </script>
</body>
</html>
