<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Inter, Helvetica, Arial, sans-serif">
  <rect width="960" height="500" fill="#FFFFFF"/>

  <!-- Arrow marker definitions -->
  <defs>
    <marker id="arrow-ink" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="8" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
  </defs>

  <!-- Eyebrow + title -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 8.1</text>
  <text x="40" y="76" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">The Five-Stage Token Pipeline Architecture</text>
  <line x1="40" y1="94" x2="920" y2="94" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Stage labels (eyebrow, all-caps, secondary) -->
  <!-- STAGE 1 -->
  <text x="60" y="128" font-size="10" font-weight="700" fill="#545454" letter-spacing="1">STAGE 1</text>
  <!-- STAGE 2 -->
  <text x="222" y="110" font-size="10" font-weight="700" fill="#545454" letter-spacing="1">STAGE 2</text>
  <!-- STAGE 3 -->
  <text x="490" y="128" font-size="10" font-weight="700" fill="#545454" letter-spacing="1">STAGE 3</text>
  <!-- STAGE 4 -->
  <text x="672" y="128" font-size="10" font-weight="700" fill="#545454" letter-spacing="1">STAGE 4</text>
  <!-- STAGE 5 -->
  <text x="838" y="128" font-size="10" font-weight="700" fill="#545454" letter-spacing="1">STAGE 5</text>

  <!-- ── Main horizontal axis: y=230 (center of stage nodes) ── -->

  <!-- Node 1: Declare -->
  <rect x="40" y="140" width="140" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="110" y="168" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">Declare</text>
  <text x="110" y="184" font-size="10" fill="#545454" text-anchor="middle">Figma file /</text>
  <text x="110" y="197" font-size="10" fill="#545454" text-anchor="middle">variable collections /</text>
  <text x="110" y="210" font-size="10" fill="#545454" text-anchor="middle">naming contract</text>

  <!-- Arrow 1 → fork -->
  <line x1="180" y1="176" x2="210" y2="176" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Decision diamond: Enterprise plan? (centered at x=230, y=176) -->
  <!-- Diamond points: top(230,156) right(252,176) bottom(230,196) left(208,176) -->
  <polygon points="230,154 254,176 230,198 206,176" fill="#FFFFFF" stroke="#121212" stroke-width="1"/>
  <text x="230" y="172" font-size="9" fill="#121212" text-anchor="middle">Enterprise</text>
  <text x="230" y="183" font-size="9" fill="#121212" text-anchor="middle">plan?</text>

  <!-- YES label (up-right) -->
  <text x="258" y="150" font-size="10" font-weight="600" fill="#545454">YES</text>
  <!-- NO label (down-right) -->
  <text x="258" y="210" font-size="10" font-weight="600" fill="#545454">NO</text>

  <!-- Fork arrow UP → Extract (API) -->
  <line x1="230" y1="154" x2="230" y2="136" stroke="#121212" stroke-width="1.5"/>
  <line x1="230" y1="136" x2="310" y2="136" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Fork arrow DOWN → Extract (Studio) -->
  <line x1="230" y1="198" x2="230" y2="218" stroke="#545454" stroke-width="1.5"/>
  <line x1="230" y1="218" x2="310" y2="218" stroke="#545454" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Node 2a: Extract (API) — Enterprise — black fill -->
  <rect x="312" y="112" width="148" height="52" fill="#121212" stroke="#121212" stroke-width="1"/>
  <text x="386" y="132" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Extract (API)</text>
  <text x="386" y="148" font-size="10" fill="#D4D4D4" text-anchor="middle">Variables REST API /</text>
  <text x="386" y="160" font-size="10" fill="#D4D4D4" text-anchor="middle">Enterprise plan</text>

  <!-- Node 2b: Extract (Studio) — non-Enterprise — dark gray fill -->
  <rect x="312" y="196" width="148" height="52" fill="#545454" stroke="#545454" stroke-width="1"/>
  <text x="386" y="216" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Extract (Studio)</text>
  <text x="386" y="232" font-size="10" fill="#D4D4D4" text-anchor="middle">Tokens Studio</text>
  <text x="386" y="244" font-size="10" fill="#D4D4D4" text-anchor="middle">plugin export</text>

  <!-- Rejoin arrows → Validate (y=176 centerline) -->
  <!-- API path arrow right -->
  <line x1="460" y1="138" x2="494" y2="138" stroke="#121212" stroke-width="1.5"/>
  <line x1="494" y1="138" x2="494" y2="176" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>
  <!-- Studio path arrow right -->
  <line x1="460" y1="222" x2="494" y2="222" stroke="#545454" stroke-width="1.5"/>
  <line x1="494" y1="222" x2="494" y2="196" stroke="#545454" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Node 3: Validate -->
  <rect x="496" y="140" width="140" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="566" y="168" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">Validate</text>
  <text x="566" y="184" font-family="JetBrains Mono, monospace" font-size="10" fill="#545454" text-anchor="middle">validate-tokens.mjs</text>
  <text x="566" y="200" font-size="10" fill="#545454" text-anchor="middle">schema + alias checks</text>

  <!-- Arrow 3→4 -->
  <line x1="636" y1="176" x2="668" y2="176" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Node 4: Distribute -->
  <rect x="670" y="140" width="130" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="735" y="168" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">Distribute</text>
  <text x="735" y="184" font-size="10" fill="#545454" text-anchor="middle">tokens/ in repo /</text>
  <text x="735" y="197" font-size="10" fill="#545454" text-anchor="middle">private registry</text>

  <!-- Arrow 4→5 -->
  <line x1="800" y1="176" x2="834" y2="176" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow-ink)"/>

  <!-- Node 5: Compile -->
  <rect x="836" y="140" width="84" height="72" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="878" y="162" font-size="13" font-weight="600" fill="#121212" text-anchor="middle">Compile</text>
  <text x="878" y="178" font-size="10" fill="#545454" text-anchor="middle">CSS</text>
  <text x="878" y="191" font-size="10" fill="#545454" text-anchor="middle">Swift</text>
  <text x="878" y="204" font-size="10" fill="#545454" text-anchor="middle">Android XML</text>

  <!-- Transform note: Style Dictionary sits between Validate and Distribute as a tool annotation -->
  <rect x="496" y="270" width="308" height="36" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="505" y="287" font-size="11" font-weight="600" fill="#121212">Transform:</text>
  <text x="591" y="287" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">Style Dictionary</text>
  <text x="505" y="300" font-size="10" fill="#545454">reads DTCG JSON → writes CSS, Swift, Android XML</text>
  <!-- Leader line to Validate/Distribute gap -->
  <line x1="566" y1="270" x2="566" y2="213" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="40" y="380" width="16" height="14" fill="#121212"/>
  <text x="62" y="392" font-size="12" fill="#121212">Enterprise path</text>
  <rect x="180" y="380" width="16" height="14" fill="#545454"/>
  <text x="202" y="392" font-size="12" fill="#121212">Non-Enterprise path</text>
  <rect x="360" y="380" width="16" height="14" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="382" y="392" font-size="12" fill="#121212">Shared pipeline stage</text>

  <!-- Caption -->
  <text x="40" y="456" font-size="13" fill="#545454">The five-stage token pipeline, with the Extract stage branching into an Enterprise path (Variables REST API) and a non-Enterprise path</text>
  <text x="40" y="472" font-size="13" fill="#545454">(Tokens Studio); both paths rejoin at the Validate stage and proceed identically through Transform, Distribute, and Compile.</text>
</svg>
