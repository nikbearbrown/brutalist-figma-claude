<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-label="Figure 13.1: MCP Session Governance Loop">
  <title>Figure 13.1 — MCP Session Governance Loop</title>
  <desc>The Figma MCP server relays structured design context from a governed Figma file to an AI coding agent; the FIGMA.md permission matrix defines what the agent may read, infer, generate, or refuse, and every code output requires human review before it merges.</desc>
  <rect width="960" height="520" fill="#FFFFFF"/>

  <!-- eyebrow / title / rule -->
  <text x="40" y="48" font-size="13" letter-spacing="1.5" fill="#545454" font-weight="700">FIGURE 13.1</text>
  <text x="40" y="74" font-family="EB Garamond, Georgia, serif" font-size="26" fill="#121212">MCP session governance loop</text>
  <line x1="40" y1="90" x2="920" y2="90" stroke="#D4D4D4" stroke-width="1"/>

  <!-- FIGMA.md governance band -->
  <rect x="40" y="108" width="880" height="90" fill="#F5F5F5" stroke="#D4D4D4" stroke-width="1"/>
  <text x="60" y="128" font-size="11" font-weight="700" letter-spacing="1" fill="#545454">FIGMA.md GOVERNANCE</text>

  <!-- Four permission zones inside band -->
  <!-- READ zone (left) -->
  <rect x="52" y="136" width="4" height="52" fill="#C8860E"/>
  <text x="68" y="157" font-size="13" font-weight="600" fill="#121212">READ</text>
  <text x="68" y="175" font-size="11" fill="#545454">published components,</text>
  <text x="68" y="189" font-size="11" fill="#545454">tokens, descriptions</text>

  <!-- INFER zone -->
  <rect x="272" y="136" width="4" height="52" fill="#C8860E"/>
  <text x="288" y="157" font-size="13" font-weight="600" fill="#121212">INFER</text>
  <text x="288" y="175" font-size="11" fill="#545454">alias chains,</text>
  <text x="288" y="189" font-size="11" fill="#545454">spacing arithmetic</text>

  <!-- GENERATE zone -->
  <rect x="492" y="136" width="4" height="52" fill="#C8102E"/>
  <text x="508" y="157" font-size="13" font-weight="600" fill="#121212">GENERATE</text>
  <text x="508" y="175" font-size="11" fill="#545454">markup, tokens,</text>
  <text x="508" y="189" font-size="11" fill="#545454">imports, stories</text>

  <!-- REFUSE / ESCALATE zone -->
  <rect x="712" y="136" width="196" height="52" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <text x="722" y="157" font-size="13" font-weight="600" fill="#121212">REFUSE / ESCALATE</text>
  <text x="722" y="175" font-size="11" fill="#545454">hardcoded values,</text>
  <text x="722" y="189" font-size="11" fill="#545454">missing mappings, WIP pages</text>

  <!-- Dividers between zones -->
  <line x1="272" y1="136" x2="272" y2="188" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="492" y1="136" x2="492" y2="188" stroke="#D4D4D4" stroke-width="1"/>
  <line x1="712" y1="136" x2="712" y2="188" stroke="#D4D4D4" stroke-width="1"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#121212"/>
    </marker>
    <marker id="arrowgray" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#545454"/>
    </marker>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#C8102E"/>
    </marker>
  </defs>

  <!-- Main horizontal flow nodes -->
  <!-- AI Coding Agent -->
  <rect x="40" y="240" width="200" height="88" fill="#FFFFFF" stroke="#121212" stroke-width="1.5"/>
  <text x="140" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#121212">AI Coding Agent</text>
  <text x="140" y="293" text-anchor="middle" font-size="11" fill="#545454">(Claude Code or equiv.)</text>
  <text x="140" y="313" text-anchor="middle" font-size="11" fill="#545454">initiates context requests</text>

  <!-- Figma MCP Server -->
  <rect x="360" y="240" width="200" height="88" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="460" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#121212">Figma MCP Server</text>
  <text x="460" y="293" text-anchor="middle" font-size="11" fill="#545454">structured context relay</text>
  <text x="460" y="313" text-anchor="middle" font-size="11" fill="#545454">fetches design data</text>

  <!-- Figma File + Dev Mode -->
  <rect x="680" y="240" width="200" height="88" fill="#F5F5F5" stroke="#121212" stroke-width="1.5"/>
  <text x="780" y="271" text-anchor="middle" font-size="15" font-weight="700" fill="#121212">Figma File</text>
  <text x="780" y="291" text-anchor="middle" font-size="15" font-weight="700" fill="#121212">+ Dev Mode</text>
  <text x="780" y="313" text-anchor="middle" font-size="11" fill="#545454">components, tokens,</text>
  <!-- Code Connect callout -->
  <rect x="680" y="338" width="200" height="26" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="1"/>
  <rect x="680" y="338" width="4" height="26" fill="#C8860E"/>
  <text x="692" y="355" font-family="JetBrains Mono, monospace" font-size="11" fill="#545454">Code Connect mappings</text>

  <!-- Context-flow arrows: agent ↔ MCP server -->
  <line x1="240" y1="272" x2="358" y2="272" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="299" y="265" text-anchor="middle" font-size="10" fill="#545454">context</text>
  <text x="299" y="277" text-anchor="middle" font-size="10" fill="#545454">request</text>
  <line x1="360" y1="292" x2="242" y2="292" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="301" y="305" text-anchor="middle" font-size="10" fill="#545454">context</text>
  <text x="301" y="317" text-anchor="middle" font-size="10" fill="#545454">response</text>

  <!-- Context-flow arrows: MCP server ↔ Figma File -->
  <line x1="560" y1="272" x2="678" y2="272" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="619" y="265" text-anchor="middle" font-size="10" fill="#545454">fetch</text>
  <line x1="680" y1="292" x2="562" y2="292" stroke="#121212" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="621" y="305" text-anchor="middle" font-size="10" fill="#545454">design data</text>

  <!-- Generated code output path (downward from agent) -->
  <line x1="140" y1="328" x2="140" y2="395" stroke="#545454" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowgray)"/>
  <text x="153" y="365" font-size="11" fill="#545454">generated code</text>
  <text x="153" y="379" font-size="11" fill="#545454">output</text>

  <!-- Human Gate node (red border) -->
  <rect x="60" y="400" width="220" height="72" fill="#FFFFFF" stroke="#C8102E" stroke-width="3"/>
  <text x="170" y="428" text-anchor="middle" font-size="15" font-weight="700" fill="#121212">Human Gate</text>
  <text x="170" y="448" text-anchor="middle" font-size="11" fill="#545454">agent surfaces; engineer decides</text>
  <text x="170" y="462" text-anchor="middle" font-size="11" fill="#545454">review required before merge</text>

  <!-- REFUSE/ESCALATE branch: exits agent node, blocked arrow -->
  <!-- Arrow from agent node right side going toward REFUSE zone, then down with ⊣ block -->
  <line x1="810" y1="284" x2="810" y2="340" stroke="#545454" stroke-width="1.5" stroke-dasharray="4 3"/>
  <line x1="750" y1="340" x2="908" y2="340" stroke="#545454" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Block symbol (⊣) for REFUSE path -->
  <line x1="750" y1="328" x2="750" y2="352" stroke="#121212" stroke-width="2.5"/>
  <line x1="750" y1="340" x2="730" y2="340" stroke="#121212" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="760" y="360" font-size="10" fill="#545454">flag for human review</text>

  <!-- Vertical governance constraint arrows (dashed) from band to main flow nodes -->
  <line x1="140" y1="198" x2="140" y2="238" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowgray)"/>
  <line x1="460" y1="198" x2="460" y2="238" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowgray)"/>
  <line x1="780" y1="198" x2="780" y2="238" stroke="#D4D4D4" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrowgray)"/>

  <!-- caption -->
  <text x="40" y="500" font-size="13" fill="#545454">The Figma MCP server relays structured design context from a governed Figma file to an AI coding agent; FIGMA.md defines what the agent may read,</text>
  <text x="40" y="516" font-size="13" fill="#545454">infer, generate, or refuse, and every code output requires human review before it merges.</text>
</svg>
